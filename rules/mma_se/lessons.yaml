  # ---- 2026-06-20 — UFC Fight Night 6/20 (classic 6-fighter) ----

  - id: mma-se-2026-06-20-fade-on-structure-not-narrative
    born: "2026-06-20"
    origin: "rules/mma_se/history/2026-06-20__ufc-6-20-26"
    statement: >
      Distinguish STRUCTURAL fades from NARRATIVE fades of live chalk-tier pieces. A
      structural fade rests on a measurable edge (ceiling-capped favorite priced above a
      live alternative, KO-or-bust with no decision floor, salary inefficiency, ownership
      leverage). A narrative fade rests on a soft scouting read ("best opponent she's
      faced," "toughest matchup, will go the distance") — that is a low-conviction coin-flip
      guess, not an edge, and the field winner can punish it. 6/20 evidence: the analysis
      narrative-faded Santos ("best opponent faced," prefer Rosa) and weighted Stirling
      UNDER ("distance-prone debut") — and BOTH were in the 47,562-field winner (Santos
      won her pick'em; Stirling posted 105.59 as the winning anchor), while Rosa (the
      leverage side) lost the coin flip and dragged her lineups to the bottom of the pool.
      The slate's one STRUCTURAL fade — Kape (ceiling-capped -155 favorite, $1K more than
      the live Horiguchi side) — was neutral-to-correct (Kape neither over- nor
      under-performed; the winner faded him). GPP guard: a pick'em resolving to the faded
      side and a boom/bust debut booming are VARIANCE, not contradictions of leverage
      theory — this is a hypothesis about fade QUALITY, not about whether to take leverage.
      Rule to test: only fade or under-weight a live, real-ceiling chalk piece when the
      fade has a structural mechanism; downgrade narrative-only fades to a note, keep the
      piece at neutral exposure. Links [[mma-se-2026-05-16-secondary-plays-are-not-leverage]].
    status: validated
    confirmations:
      - date: "2026-06-27"
        slate: "UFC Fight Night, Baku (classic 6-fighter)"
        note: >
          Directional confirmation. Every fade on this slate was STRUCTURAL and none was a
          narrative scouting guess: Shara Magomedov was faded as a ceiling-capped -400
          favorite (Decision 4) and the Torres+Fiziev pile was faded as main-event
          over-concentration (Leverage & fades). Shara was neutral-to-correct — not a
          slate-defining overperformer (his lone top-20 appearance, 490 rank 2, was carried
          by the other five), so the structural fade did not cost. The structural main-event
          read was vindicated hard: the strategy preferred the lower-owned Fiziev over the
          chalk Torres, Fiziev WON and anchored nearly every top lineup across all three
          contests, and the user's best build (594 L3, rank 8 / 1.3%ile) was a Fiziev build
          while every Torres entry he ran underperformed. Structural fades held; no narrative
          fade was made to be punished, so this confirms the structural half of the
          mechanism (the narrative-punishment half still awaits a test).
      - date: "2026-07-12"
        slate: "UFC 329 (McGregor vs. Holloway) — classic 6-fighter, two 291-field SEs"
        note: >
          Narrative-punishment half now tested and CONFIRMED. The strategy narrative-faded
          two whole fights on a pace read — Sandhagen/Bautista and Cong/Cortez tagged
          "traps to fade — distance-leaning, low-dominance, no clear path to a smash, eat
          salary without a ceiling." That is a soft scouting/pace narrative, not a
          structural mechanism. It was punished catastrophically: Mario Bautista (the
          faded side) posted 137.43 — the slate's #1 score and in both winning lineups —
          and Wang Cong posted 90.46 (slate-defining, ~30% of a contest's top lineups).
          A dominant paced decision is a real MMA ceiling; "goes the distance" was wrongly
          equated with "low ceiling." NOTE: this was a fade of a whole fight / a live dog,
          an EXTENSION of the original "live chalk piece" object, so treat as strengthening
          evidence rather than a clean replication — the specific distance-lean error is
          carried by [[mma-se-2026-07-12-distance-fight-is-not-low-ceiling]]. Near
          promotion; leave validated pending one clean chalk-piece replication.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mma-se-2026-06-20-finish-capable-favorite-is-not-secondary-chalk
    born: "2026-06-20"
    origin: "rules/mma_se/history/2026-06-20__ufc-6-20-26"
    statement: >
      Ownership alone does not make a mid-priced favorite a leak. The "secondary plays are
      not leverage, trim the 20-25% chalk" instinct (and the red team's "unearned chalk
      concentration" finding) should EXEMPT a finish-capable favorite in a clean matchup —
      that is a legitimate high-exposure core, structurally distinct from a no-ceiling
      decision-grinder at the same ownership. 6/20 evidence: the red team flagged Oliveira
      at 60% exposure (25% own, analysis-rated MIX, "secondary not leverage") as chalk to
      trim to 3-4; in hindsight Oliveira was a slate-defining OVERPERFORMER (122.51, +44.05
      vs proj) and appeared in BOTH the field winner (606.69) and the user's best lineup
      (553.52). Trimming him would have weakened the portfolio's best builds. Evidence
      against over-trusting the red-team "trim secondary chalk" heuristic when the piece is
      a finisher in a clean spot. Mechanism to test: separate "secondary chalk" (mid-own,
      capped ceiling, decision-dependent — trimmable) from "finish-capable favorite" (mid-own
      but real finishing path in a clean matchup — high exposure is fine). Links
      [[mma-se-2026-05-16-secondary-plays-are-not-leverage]].
    status: codified
    confirmations:
      - date: "2026-06-27"
        slate: "UFC Fight Night, Baku (classic 6-fighter)"
        note: >
          Confirmed. Decision 2 played the Abus/Oleksiejczuk banger as a legit PLAY core
          (not trimmed as secondary chalk) and Decision 3 kept Reyes/Camilo as
          finish-capable value cores exempt from the chalk-trim instinct. Abus Magomedov
          (17% own) hit 105.08 and was in 35-40% of every contest's top lineups; Matheus
          Camilo (18-20% own) hit 101.69 and was in 55-60% of small-field top lineups. Both
          were mid-owned finish-capable favorites in clean spots, both were slate-definers —
          trimming either as "secondary chalk" would have cut two of the slate's cheap
          definers. Mechanism holds: finish path in a clean matchup, not ownership, decides
          whether a mid-own favorite is a core or a trimmable leak.
      - date: "2026-07-12"
        slate: "UFC 329 (McGregor vs. Holloway) — classic 6-fighter, two 291-field SEs"
        note: >
          Third confirming slate — promotion candidate. Damian Pinas (26% own, played as a
          top core, NOT trimmed) hit 110.7 and Ryan Gandra (29-33% own) hit 104.2 — both
          mid-owned finish-capable favorites in clean spots, both slate-definers, both in
          BOTH 686.38 winning lineups. King Green (28-35% own, the leverage side of the
          -1200 fight) hit 120.1 as a third mid-own finisher-core. Trimming any as
          "20%+ = secondary chalk" would have gutted the winning lineup's spine.
          Ownership did not make them leaks; the clean finish path made them cores.
          Origin (6/20) + 6/27 + 7/12 = three confirming mechanism slates → propose
          codifying into framework.md.
    contradictions: []
    codified_in: "framework.md — Finish-Capable Favorites Are Not Secondary Chalk (7/12/26 — 3-slate validated)"
    retired_reason: null

  # ---- 2026-06-27 — UFC Fight Night, Baku ----

  - id: mma-se-2026-06-27-leverage-is-the-low-own-finisher-not-the-named-dog
    born: "2026-06-27"
    origin: "rules/mma_se/history/2026-06-27__ufc-baku-6-27-26"
    statement: >
      In finish-heavy classic MMA the slate-defining sub-10%-owned leverage piece is
      almost always a LOW-OWNED CONVERTING FIGHTER/FINISHER below the articles'
      spotlight — not the KO-or-bust underdog the articles name. The 6/27 Baku
      slate-definer was Kaan Ofli (112.76 pts at 5.71%/6.23%/9.42% own, in 45-70% of
      every contest's top lineups) — never mentioned anywhere in the strategy — joined by
      Tahir Abdullayev (80.16 at ~9% own, 30-40% of top lineups) and Nursulton Ruziboev
      (107.24 at 16.6%, ~35%). Meanwhile the strategy's deliberately-chosen sub-10%
      leverage piece was Julius Walker (+425 KO-or-bust dog vs Yakhyaev), who busted. The
      sharp-envelope "carry >=1 sub-10% piece" was nominally satisfied but with the wrong
      horse: the build hunted leverage only among the article-spotlighted long-shot DOGS
      and never screened the full rosterable pool for low-owned FINISHERS who win outright.
      Rule to test: before locking, screen EVERY rosterable fighter under ~10% projected
      own for a real finish path (favorites and live dogs alike) and surface them as
      leverage candidates — do not let the sub-10% slot default to the article-named binary
      dog. Links [[mma-se-2026-05-16-binary-leverage-weak-in-small-fields]],
      [[mma-se-2026-06-14-showdown-cheap-slot-prefer-floor-or-live-dog]],
      [[mma-se-2026-06-20-finish-capable-favorite-is-not-secondary-chalk]].
    status: validated
    confirmations:
      - date: "2026-07-12"
        slate: "UFC 329 (McGregor vs. Holloway) — classic 6-fighter, two 291-field SEs"
        note: >
          Confirmed hard. The slate-definer was Mario Bautista (137.43 — the #1 score on
          the board, 15.1-16.5% own, in 40-60% of every contest's top lineups and in BOTH
          686.38 winning lineups), a low-owned converting fighter below the article
          spotlight — exactly the pattern. Worse than 6/27: the strategy did not merely
          fail to surface him, it actively FADED his entire fight (Sandhagen/Bautista
          tagged a "trap to fade — distance-leaning, no path to a smash"). Brandon Royval
          (114.79 at ~20% own, ~35% of a contest's top lineups) was a second
          below-spotlight definer the strategy faded to play the chalkier favorite
          (Kavanagh, who lost, 42.7). Every leverage piece the strategy DID hunt
          (Kavanagh 17 / Costa 20 / Yanez 17 / Riley 11) was an article-named favorite and
          none hit, while the two actual definers sat in fights the strategy dismissed.
          Mechanism holds and sharpens: screen the FULL rosterable pool — 12-20% own
          included, both dogs AND favorites — for low-owned converters, and never fade a
          whole fight out of the search. Links
          [[mma-se-2026-07-12-distance-fight-is-not-low-ceiling]].
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mma-se-2026-06-27-finish-heavy-small-fields-still-won-by-differentiation
    born: "2026-06-27"
    origin: "rules/mma_se/history/2026-06-27__ufc-baku-6-27-26"
    statement: >
      On finish-heavy boards even small (~500-entry) fields are won by DIFFERENTIATED
      builds, not chalk — so the "small field -> lean chalk-with-one-swing" field-size
      calibration needs a finish-heavy caveat. 6/27 Baku: all three contest winners ran
      ~16-18% avg own (490 winner coopjs23 16.57 / 2 sub-10; 594 winner 18.27; 1189 winner
      17.19), while the user's chalkiest build (490 entry, 43.37% avg own, 0 sub-10)
      finished 90.2%ile — dead last of his entries — and his most differentiated build
      (594 L3, 29.15% avg own, carrying Fiziev+Camilo+Hasanov) finished rank 8 / 1.3%ile.
      Mechanism: 10-of-13 finish equity produces wide outcome dispersion that lets
      low-owned finishers separate even in a 490 field, so chalk concentration that would
      be survivable on a decision-heavy slate gets buried. Rule to test: on slates with
      >=70% of fights projected to finish, hold the small-field build to the same ~16-20%
      avg-own / >=1 sub-10 differentiation target as the medium field — do not relax to
      chalk just because the field is small. Links [[mma-se-2026-05-17-field-size-calibration]],
      [[mma-se-2026-06-27-leverage-is-the-low-own-finisher-not-the-named-dog]].
    status: hypothesis
    confirmations:
      - date: "2026-07-12"
        slate: "UFC 329 — two 291-field SEs, finish-heavy board"
        note: >
          Low-own-DEFINER half confirmed. Both 686.38 winning lineups carried the
          15-16%-owned slate-definer Mario Bautista, and every top-20 lineup carried at
          least one sub-20% converter (Bautista / Royval / Gandra). Catching >=1 low-owned
          definer was necessary to win — chalk-only builds could not reach 686.
    contradictions:
      - date: "2026-07-12"
        slate: "UFC 329 — two 291-field SEs"
        note: >
          Avg-own TARGET half contradicted by the winning structure — a mechanism
          refinement, not a retirement (GPP-guarded: this is the winner's structure, not
          "we lost"). The winning lineup was ~40.2% avg own with 0 sub-10 plays
          (Holloway 62% + Pimblett 50% + Pinas 41% + Bautista 15% + Gandra 32% +
          Green 35%); winners_profile avg_own_per_slot 40.2, dart_pct 0.0. This 291
          finish-heavy field was won by a chalk-ANCHORED build that caught ONE low-owned
          definer — NOT by a 16-20% avg-own build. The user's more-differentiated ~34-38%
          builds finished 26-34%ile. The edge here was not lower avg-own; it was running
          six fighters who all WON (96-137 pts, zero busts) including one low-owned
          converter, while the user's ceilings were capped by dead LOSING slots
          (Reese 2.0, McGregor 1.0). Reframe toward: "differentiate through low-owned
          WINNING favorites and carry no likely-loser slot," NOT "cut whole-build avg-own
          to 16-20%." Links [[mma-se-2026-05-16-binary-leverage-weak-in-small-fields]],
          [[mma-se-2026-07-12-distance-fight-is-not-low-ceiling]].
    codified_in: null
    retired_reason: null

  # ---- 2026-07-12 — UFC 329 (McGregor vs. Holloway) ----

  - id: mma-se-2026-07-12-distance-fight-is-not-low-ceiling
    born: "2026-07-12"
    origin: "rules/mma_se/history/2026-07-12__ufc-329"
    statement: >
      "Goes the distance / distance-leaning" is NOT the same as "low ceiling," and a whole
      fight must not be faded on that basis. MMA DK scoring rewards significant-strike
      volume, control time and takedowns heavily, so a fighter who wins a dominant,
      high-pace 15-minute decision can reach finish-level scores (120-140+) with no finish.
      UFC 329 evidence: the strategy tagged Sandhagen/Bautista a "trap to fade —
      distance-leaning, low-dominance, no path to a smash, eats salary without a ceiling,"
      and Mario Bautista (15-16% own) then won a paced decision for 137.43 — the #1 score
      on the board and in both 686.38 winning lineups. Wang Cong, from the other
      "distance/low-dominance" faded fight (Cong/Cortez), posted 90.46 (slate-defining).
      Mechanism: pace + volume + grappling control IS a ceiling; a distance projection caps
      ceiling ONLY when it is also low-volume/low-control (a true point-fighting stalemate).
      Rule to test: before fading a fight for going the distance, check projected
      pace/volume/control — a high-output fighter favored to win a dominant decision carries
      a real 100+ ceiling, and if low-owned that is leverage, not a trap. Links
      [[mma-se-2026-06-27-leverage-is-the-low-own-finisher-not-the-named-dog]],
      [[mma-se-2026-06-20-fade-on-structure-not-narrative]].
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null
