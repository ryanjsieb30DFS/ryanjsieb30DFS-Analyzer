# Lesson ledger — one entry per generalizable lesson. Claude edits during the
# post-autopsy review; the user approves codifications/retirements.
# Lifecycle: hypothesis -> validated -> codified | retired.
# Promotion: 3 mechanism confirmations -> propose codifying into framework.md.
# Retirement: 2 mechanism contradictions -> propose retiring.
# GPP guard: a lost contest is NOT a contradiction; only mechanism failures count.
lessons:
  # ---- 2026-05-09 — UFC Chimaev vs. Strickland ----

  - id: mma-se-2026-05-09-verify-submission-before-lock
    born: "2026-05-09"
    origin: "autopsies.md — 2026-05-09 UFC Chimaev vs. Strickland — Process-Level Lessons"
    statement: >
      Read back the locked DK lineup against the final recommendation before
      submitting. The $12 SE lost differentiation because the recommended
      Kopylov-to-Miller leverage swap was never applied — an execution failure,
      not a strategy failure, and one a 30-second verification step removes entirely.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Pre-Submission Checklist for SE (item 10: Submission verified)"
    retired_reason: null

  - id: mma-se-2026-05-09-confirmed-vs-speculative-news
    born: "2026-05-09"
    origin: "autopsies.md — 2026-05-09 UFC Chimaev vs. Strickland — Process-Level Lessons"
    statement: >
      In SE, react fully to CONFIRMED news but only partially to SPECULATIVE news.
      Swapping away from a reliable scorer onto a KO-or-bust replacement on
      unconfirmed injury news trades a known any-outcome floor for a binary bet —
      the Brady-to-Buckley swap (Brady 136.27, Buckley 5.20) was an overreaction,
      and SE's one-shot structure makes that risk asymmetry worse.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  # ---- 2026-05-16 — UFC Vegas 117 (Allen vs. Costa) ----

  - id: mma-se-2026-05-16-no-identical-conviction-cores
    born: "2026-05-16"
    origin: "autopsies.md — 2026-05-16 UFC Vegas 117 — Process-Level Lessons"
    statement: >
      Never lock identical conviction cores across multiple SEs: shared anchors make
      two entries a single bet, so one anchor's failure kills both lineups
      identically (Santos + Gantt in both SEs; Santos lost and both died together).
      Differentiate on at least one of the two conviction anchors, accepting that
      one SE underweights a play you believe in — that IS the hedge.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Step 5 — Diversification; The Santos/Gantt Pairing Lesson; philosophy.md — SE Diversification Rules"
    retired_reason: null

  - id: mma-se-2026-05-16-ceiling-threshold-discipline
    born: "2026-05-16"
    origin: "autopsies.md — 2026-05-16 UFC Vegas 117 — Process-Level Lessons"
    statement: >
      Before locking a SE, sum all 6 fighters' win-case projections and compare to
      the field-size winning threshold; a lineup whose ceiling can't reach the
      historical winning score is built to cash, not to win, and SE prize structures
      pay only the top. The 5/16 lineups were ceiling-capped at ~572/~581 in a field
      whose winner scored 660.81 — no variance outcome could have won.
    status: codified
    confirmations:
      - date: "2026-06-14"
        slate: "UFC Freedom 250 (White House) — captain-mode showdown, 5,945 field"
        note: >
          Confirmed in the positive direction. The build summed win-case ceilings to
          ~620-652 against a ~600+ target; the winning score was 618.43 and the user's
          best lineup (L4) hit 615.37 actual (rank 14/5,945). The gate correctly
          targeted the winning range — the build COULD reach the winning score and
          nearly did. The ceiling threshold did its job: no lineup was built to cash
          short of the winning number.
    contradictions:
      - date: "2026-05-30"
        slate: "UFC Macau"
        note: >
          Mechanism limitation, not retirement: the threshold is computed from
          chalk-friendly projections, so applied alone it forced high-projection
          mid-range chalk (Dias/Ding/Perez) and zeroed out the low-own finishers
          (Amorim, Vera) who actually won. Refined in framework.md rather than
          retired — keep the gate, reserve >=1 field-fade lineup.
    codified_in: "framework.md — Step 4 (item 6) + Pre-Submission Checklist item 7; philosophy.md — Ceiling Threshold Discipline"
    retired_reason: null

  - id: mma-se-2026-05-16-binary-leverage-weak-in-small-fields
    born: "2026-05-16"
    origin: "autopsies.md — 2026-05-16 UFC Vegas 117 — Process-Level Lessons"
    statement: >
      In small-field SEs (under ~500 entrants), pure KO-or-bust leverage plays are
      structurally weak: a ~25% chance of 115 points and 75% chance of ~0 blends to
      ~29 EV, while a fighter with KO upside AND a decision floor blends to ~90.
      Small fields don't require extreme variance to separate, so prefer leverage
      with blended EV above ~50; save pure-binary plays for large fields.
    status: codified
    confirmations:
      - date: "2026-06-14"
        slate: "UFC Freedom 250 (White House) — captain-mode showdown, 5,945 field"
        note: >
          Large-field inverse confirmed. In the 5,945-entry field a pure binary dog
          hit and was in the winning lineup: Gaethje (19% to win, KO-or-bust) upset
          Topuria (81% main-event chalk) and posted 127.14. The winning roster
          (Gaethje/Ruffy/Hokit/Bo/Gane/Zahabi) carried that binary dog, and the
          user's two best lineups (L4 rank 14, L7 rank 821) were the two Topuria-free
          builds that also carried Gaethje. Mechanism: large fields reward the extreme
          variance that small fields punish — the build correctly inverted the rule
          for this field size, though it used Gaethje only as salary relief rather
          than as the deliberate binary swing.
      - date: "2026-06-20"
        slate: "UFC Fight Night 6/20 (classic — 784/1,189 SEs + 47,562 mini-MAX)"
        note: >
          Both directions confirmed in one slate. SMALL-FIELD side: the two SE bullets
          correctly filled the cheap slot with value-favorite floors, not pure punts
          (post-red-team the cheap slot became Horiguchi, a +135 grappling decision floor),
          and both SEs cleared their fields cleanly (16.1%ile / 31.8%ile) without binary
          variance. LARGE-FIELD side: the pure binary punts (Bolanos +330, Borjas +475)
          that the build confined to the 47,562 mini-MAX were the two slate-defining plays
          and Borjas was in the field winner — the exact extreme-variance the small fields
          punish but the large field rewards. The build put binary leverage on the right
          side of the field-size line in both directions.
      - date: "2026-06-27"
        slate: "UFC Fight Night, Baku (classic; 490 small SE + 1,189 medium SE)"
        note: >
          Small-field-floor half confirmed again. Decision 5 filled the 490 cheap slot with
          a value-favorite FLOOR (Matheus Camilo, $7.2k) rather than a binary punt; Camilo
          hit 101.69 and appeared in 55-60% of the small-field top lineups. The medium-field
          half exposed a refinement, not a contradiction: the chosen large-field binary DOG
          (Walker, +425 vs Yakhyaev) busted, and the 1,189 field was actually won by
          low-owned FINISHERS (Ofli/Abdullayev/Ruziboev), not a KO-or-bust dog — i.e. the
          large-field leverage horse should have been a sub-10% finisher, not the
          article-named long-shot. Feeds [[mma-se-2026-06-27-leverage-is-the-low-own-finisher-not-the-named-dog]].
      - date: "2026-07-12"
        slate: "UFC 329 — two 291-field SEs (small field)"
        note: >
          Small-field side re-confirmed via an execution deviation. The strategy CORRECTLY
          applied the rule — Decision 4 PASSed the KO-or-bust dogs (Ellison 2%, Garbrandt
          9%, Garza 7%) as core plays in a 291 field. The user's contest-2 entry then
          deviated onto Conor McGregor (+225 main-event KO-or-bust dog, ~21% own), who
          scored 1.0 and was a documented fish trap (24-31% of the fish, 0% of winners).
          The single dead binary slot capped an otherwise-live build (Pimblett 117.7 /
          Steveson 116.7 / Green 120.1 all in it) at 501.32 / 26.1%ile. Real-world
          confirmation that pure binary dogs are structurally punished in small fields —
          the rule was right; the deviation cost.

  - id: mma-se-2026-05-16-secondary-plays-are-not-leverage
    born: "2026-05-16"
    origin: "autopsies.md — 2026-05-16 UFC Vegas 117 — Process-Level Lessons"
    statement: >
      A 20%+-owned play is not leverage, it is secondary chalk — at that ownership a
      hit doesn't separate you from the field. True SE leverage is sub-15% owned
      (ideally sub-12%) with a realistic 100+ point path; audit the "leverage" slot
      and swap anything 20%+ for something that actually contradicts chalk.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Step 2 — Contrarian Swing Identification; Secondary Plays Are Not Leverage"
    retired_reason: null

  # ---- 2026-05-30 — UFC Macau ----

  - id: mma-se-2026-05-30-asymmetric-anchor-equivalence-weighting
    born: "2026-05-30"
    origin: "autopsies.md — 2026-05-30 UFC Macau — Process-Level Lessons"
    statement: >
      Anchor-equivalence is about presence, not weighting — but when the chalk side
      of an equivalent pair is BOTH the chalkiest play on the slate AND KO-or-bust
      (no decision floor), weight the pivot side heavier than 50/50: the pivot
      carries the same realistic win equity with far better leverage. The 40/40
      Zhang/Pavlovich split left 40% of the portfolio on the side that busted (10.09)
      while the pivot smashed (128.6).
    status: codified
    confirmations:
      - date: "2026-06-14"
        slate: "UFC Freedom 250 (White House) — captain-mode showdown, 5,945 field"
        note: >
          Boundary confirmation — the trigger correctly did NOT fire, and the default
          50/50 was right. The equivalence pair was Gane(48%)/Pereira(52%): the
          chalkier side (Pereira) was NOT the chalkiest play on the slate (Hokit 75 /
          Topuria 68 were chalkier) and Pereira had a finish lean but a decision floor
          existed in the fight, so the "chalkiest-AND-KO-or-bust" condition was unmet.
          A flat 50/50 (one CPT each side) was therefore correct; weighting toward
          either side would have been a guess. Validates the rule's specificity — it
          asks for asymmetry only under a narrow condition, not on every equivalence
          pair.
    contradictions: []
    codified_in: "framework.md — Asymmetric Anchor-Equivalence Weighting (5/30/26 — UFC Macau)"
    retired_reason: null

  - id: mma-se-2026-05-30-se-bullet-is-the-differentiated-build
    born: "2026-05-30"
    origin: "autopsies.md — 2026-05-30 UFC Macau — Process-Level Lessons"
    statement: >
      When one SE entry sits behind a multi-lineup portfolio and the chalk anchor is
      boom/bust, the SE bullet should be the highest-conviction DIFFERENTIATED build,
      not the chalk-correct one — the single bullet is where differentiation matters
      most because you only get one swing. The 5/30 SE used the Zhang chalk lineup
      (539/901) while the differentiated Pavlovich+Haddon build went 30/577 elsewhere.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — SE-Bullet Selection (5/30/26 — UFC Macau)"
    retired_reason: null

  - id: mma-se-2026-05-30-ceiling-gate-underrates-low-own-finishers
    born: "2026-05-30"
    origin: "autopsies.md — 2026-05-30 UFC Macau — Process-Level Lessons"
    statement: >
      The win-case ceiling threshold is computed from chalk-friendly projections, so
      it systematically steers builds toward high-projection mid-range chalk and away
      from cheap, low-owned finishers whose ceiling the projections under-rate (the
      5/30 winner's differentiators, Amorim and Vera, were rated bust-risk and held
      at 0%/10% exposure). Keep the threshold but reserve at least one lineup for the
      field-fade secondary tier — sub-25%-owned fighters with a live finishing/volume path.
    status: codified
    confirmations:
      - date: "2026-06-20"
        slate: "UFC Fight Night 6/20 (classic, 47,562 mini-MAX field)"
        note: >
          Strong large-field confirmation. The two slate-defining plays per the autopsy
          were the two cheapest punts the analysis reserved for the field-fade builds:
          Bolanos ($6.8K, 13% proj / 15.0% actual, 71.86 pts, in 68% of top lineups) and
          Borjas ($6.5K, 11% / 9.4% actual, 50.84 pts, in 33% of top lineups). The
          47,562-field WINNER (606.69) was Stirling/BORJAS/Rodriguez/Santos/Chokheli/
          Oliveira and the user's own best lineup (553.52, rank 799, 1.7%ile) was
          Kape/BORJAS/Santos/Magomedov/Chokheli/Oliveira — a sub-12% punt anchored the
          ceiling of both. The build correctly confined the punts to the mini-MAX
          field-fade lineups (L4-L10) and kept them OUT of the two SE bullets, exactly as
          the lesson prescribes. The reserved-field-fade rule produced the winning structure.

  - id: mma-se-2026-05-30-anchor-equivalence-fifth-validation
    born: "2026-05-30"   # rule predates this ledger (4-slate-validated before Macau); this entry logs the MMA confirmation
    origin: "autopsies.md — 2026-05-30 UFC Macau — What Worked"
    statement: >
      The shared Anchor-Equivalence rule applies fully to MMA: chalk-tier anchors at
      similar ownership are substitutable to the field, so running the alternative
      captures uncontested leverage when it outperforms. At Macau every good finish
      was a Pavlovich-not-Zhang lineup — the rule's 5th cross-sport validation.
    status: codified
    confirmations:
      - date: "2026-05-30"
        slate: "UFC Macau"
        note: "5th validation; Pavlovich-not-Zhang lineups produced top-5% finishes in two contests."
      - date: "2026-06-14"
        slate: "UFC Freedom 250 (White House) — captain-mode showdown, 5,945 field"
        note: >
          6th validation, captain-mode. The mandatory Gane(48%)/Pereira(52%) co-main
          pick'em was captained on both sides (L5 Gane, L6 Pereira) and repped both
          sides across flex. Gane WON big (152.94, 91-pt overperform) and Pereira
          BUSTED (4.8). The Gane-side lineups survived (the user's best, L4, carried
          Gane and went rank 14/5,945); the Pereira-side lineups cratered. Had the
          build gone one-sided on Pereira — the slightly-chalkier 52% side the field
          favored — the entire portfolio dies. Mechanism confirmed: equivalent chalk
          anchors are substitutable to the field, so both-sides presence is what
          captured the live side.
      - date: "2026-06-27"
        slate: "UFC Fight Night, Baku (classic 6-fighter; 490/594/1189 fields)"
        note: >
          7th validation, classic format. Decision 1 ran the cheaper anchor-equivalent
          alternative (Donchenko, ~28% own) opposite the slate's chalkiest finisher
          (Yakhyaev, SIN 49/DF 36) across the two SEs. Donchenko-not-Yakhyaev anchored
          the 1,189-field WINNER (Leeleebee 671.42 = Ruziboev/Camilo/Hasanov/Ofli/
          Donchenko/Abdullayev) and recurred through the top of all three contests, while
          Yakhyaev-anchored lineups also cleared (he was not a bust) — exactly the
          substitutable-anchor outcome: running the cheaper equivalent captured the
          uncontested win without sacrificing the chalk side.
    contradictions: []
    codified_in: "rules/shared/anchor_equivalence.md"
    retired_reason: null

  # ---- Indexed from the 2026-05-17 framework/philosophy (operating rules not tied to a single autopsy) ----

  - id: mma-se-2026-05-17-field-size-calibration
    born: "2026-05-17"   # date of the framework/philosophy docs these rules were codified in
    origin: "framework.md — Step 3 — Field-Size Calibration (also philosophy.md — Field Size Matters More in SE)"
    statement: >
      Required differentiation scales with field size: under ~500 entrants a
      chalk-leaning conviction core with one quality swing can win; 500-1,500 needs
      genuine differentiation (~60-65% conviction / 35-40% leverage); 1,500+ demands
      fading a top chalk or pairing contrarian pieces, because the chalk is more
      locked in and shared outcomes can't separate you.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Step 3 — Field-Size Calibration"
    retired_reason: null

  - id: mma-se-2026-05-17-one-leverage-swing-conviction-core
    born: "2026-05-17"   # date of the framework/philosophy docs these rules were codified in
    origin: "philosophy.md — Conviction vs. Contrarian in SE (also framework.md — Steps 1-2)"
    statement: >
      A SE is one shot, so conviction plays are the load-bearing walls: lock 2-3
      conviction anchors (~70% of the build) and include exactly ONE sub-20%-owned
      leverage swing (~30%) that supports the core rather than carrying it. Unlike
      MME, a single lineup cannot afford to ride a contrarian bet as its core thesis.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "philosophy.md — Conviction vs. Contrarian in SE; framework.md — Steps 1-2"
    retired_reason: null

  # ---- 2026-06-14 — UFC Freedom 250 (White House), captain-mode showdown ----

  - id: mma-se-2026-06-14-showdown-flex-spine-diversity
    born: "2026-06-14"
    origin: "rules/mma_se/history/2026-06-20__ufc-250-freedom-6-14-26"
    statement: >
      In captain-mode showdown, "distinct captains" can mask a shared 5/6 flex spine:
      lineups with different captain hats but the same five flex fighters are a single
      bet, so one fighter's bust craters the whole cluster together. The red team
      flagged exactly this (L1/L9/L10 all carried the Topuria+Pereira+Zahabi+Chandler
      spine and differed only by one flex plus the captain) and the FIX was ignored;
      Pereira then busted (4.8) and the trio finished 58.8% / 50.0% / 76.2% as a
      block, the predicted failure mode realized. Enforce flex-spine diversity (cap
      shared flex at <=4/6 across any pair), not just distinct captains, when judging
      portfolio uniqueness in showdown.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mma-se-2026-06-14-showdown-cap-single-favorite-exposure
    born: "2026-06-14"
    origin: "rules/mma_se/history/2026-06-20__ufc-250-freedom-6-14-26"
    statement: >
      A single non-captain favorite carried in 7-9 of 10 showdown lineups is a
      portfolio-level correlated bet, not diversification — when that chalk favorite
      busts it sinks the bulk of the portfolio at once. Topuria (81% main-event chalk,
      proj 90) was in 7/10 lineups and LOST to Gaethje; the only two lineups to clear
      500 points (L4 rank 14/5,945, L7 rank 821) were the two Topuria-free builds, and
      both also carried the upset dog. The portfolio was saved by two fades that were
      accidents of salary relief, not a deliberate hedge. Rule to test: cap any single
      favorite's flex share (~<=60% of lineups) and ALWAYS carry >=2 lineups that fade
      the chalkiest favorite / the main-event chalk. Links [[mma-se-2026-06-14-showdown-flex-spine-diversity]];
      generalizes the red team's "Bo in 9/10 with zero hedge" finding (Bo won, so the
      realized evidence is Topuria, but the mechanism is identical).
    status: validated
    confirmations:
      - date: "2026-06-20"
        slate: "UFC Fight Night 6/20 (CLASSIC, not showdown — mechanism is format-agnostic)"
        note: >
          Classic-format confirmation of the cap mechanism, WITH a boundary correction.
          Confirm: Rodriguez (21% leverage favorite) was capped at 6/10 with four
          deliberate Rodriguez-free hedge builds; he hit (114.29) but the cap cost nothing
          because the hedges existed, and the field winner itself faded the main-event
          chalk (606.69 = Stirling/Borjas/Rodriguez/Santos/Chokheli/Oliveira, zero
          main-event fighters) — capping/hedging the chalkiest favorite was directionally
          right. BOUNDARY: the build over-applied "fade the main-event chalk" all the way
          to 0/10 exposure on BOTH sides (Horiguchi 47% + Kape 42%), which the red team
          flagged as an Anchor-Equivalence violation (the rule requires running the
          alternative anchor in >=1 lineup; 0/10 satisfies neither side). The user HEEDED
          the red team and restored the main event before lock (actual entries: Horiguchi
          ~22.7%, Kape in the SEs + several mini-MAX) — and that restoration produced the
          user's single best lineup (553.52, 1.7%ile, which carried Kape). Mechanism
          refinement to carry forward: "cap + carry >=2 fades" must NOT collapse into
          "zero exposure," which crosses from diversification into an anchor-equivalence
          breach. Cap the favorite; do not zero it. Links [[mma-se-2026-05-30-anchor-equivalence-fifth-validation]].
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mma-se-2026-06-14-showdown-trust-cpt-own-not-projected-overall-own
    born: "2026-06-14"
    origin: "rules/mma_se/history/2026-06-20__ufc-250-freedom-6-14-26"
    statement: >
      In 150-Max captain-mode showdown the field fragments across captains, so
      projected OVERALL own% (the DailyFan number that sums to ~600 over 6 slots)
      massively overstates real exposure: the consensus top fighter Hokit projected
      ~75 overall but drew only ~12.6% actual captain own, and the entire "chalk" sat
      in single digits to low-teens actual. DailyFan's CAPTAIN-own column, by contrast,
      was well calibrated (Hokit 16->12.6, Bo 7->6.1, Ruffy 3->4.0, Gane 10->7.8). The
      upset finisher that won (Gaethje) hid behind 44% projected overall / 7.9% actual.
      Implication: make leverage/fade calls off CPT-own, not projected overall own —
      "fading chalk" by overall own often fades something the field barely rosters, and
      a low-actual-own converting favorite is the real edge. (Calibration weight is a
      note, not a rule yet — small sample; see vendor_calibration.jsonl.)
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mma-se-2026-06-14-showdown-cheap-slot-prefer-floor-or-live-dog
    born: "2026-06-14"
    origin: "rules/mma_se/history/2026-06-20__ufc-250-freedom-6-14-26"
    statement: >
      The cheap salary-relief slot in showdown frequently decides the lineup, so it
      should prefer a decision-floor fighter or the live finishing dog over pure
      "makes-the-math-work" chalk relief. Chandler (44% proj, pure relief) was carried
      in 8/10 lineups and scored 1.2 (busted); the winning roster and the user's best
      lineup (L4) instead used Zahabi (decision floor — his fight went the distance for
      volume) and Gaethje (the live KO dog who hit). The build leaned Chandler (8) over
      Zahabi (6) despite its own analysis naming Zahabi the only dog with a decision
      floor. Confirms the red team's cheap-slot field-duplication finding in hindsight.
    status: validated
    confirmations:
      - date: "2026-06-20"
        slate: "UFC Fight Night 6/20 (classic — same cheap-slot decision, split by field)"
        note: >
          Format split validated. The analysis's Decision 4 split the cheap slot by field
          size: decision-floor favorite for the small SEs, live finishing dog for the big
          field. BIG-FIELD live-dog half CONFIRMED — Borjas/Bolanos (the live finishing
          punts) were the two slate-defining plays and Borjas anchored both the field winner
          and the user's best lineup. SMALL-FIELD floor half CONFIRMED with a process catch:
          the build's selected SE bullet (L1) initially filled the cheap slot with a
          live DOG (Shahbazyan, +310, NO floor) instead of the decision FLOOR (Horiguchi)
          the analysis prescribed — the red team flagged exactly this ("swap Shahbazyan ->
          Horiguchi to restore the prescribed value-favorite floor"), the user heeded it,
          and Shahbazyan scored 0.0 while the restored-Horiguchi SE entries cleared their
          fields (16.1%ile / 31.8%ile). The lesson's core claim — the cheap slot decides
          the lineup, so prefer a floor or a LIVE finishing dog over no-floor variance —
          held on both halves of the field split.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mma-se-2026-06-14-showdown-captain-the-ceiling-pair-the-smash
    born: "2026-06-14"
    origin: "rules/mma_se/history/2026-06-20__ufc-250-freedom-6-14-26"
    statement: >
      In captain-mode showdown the winning lineup is an assembled COMBINATION, not a set
      of correct individual reads — with limited bullets two construction rules close most
      of the gap to the optimal: (1) your highest-CEILING play must occupy the 1.5x CPT
      slot in >=1 lineup (the captain is the single highest-leverage decision; a top-ceiling
      fighter left in flex every lineup caps win equity), and (2) your lowest-owned
      high-ceiling smash must appear alongside your STRONGEST flex core in >=1 build, not
      isolated. Evidence (UFC 250 Freedom, contest 191363697, field 5,945): the user's
      reads were elite — 100% overperformer capture, lineups +13% vs projection, best build
      rank 14/5,945 (top 0.24%) — yet finished 3.06 pts behind moklovin's winning lineup
      (CPT Gaethje + Ruffy + Hokit/Nickal/Gane/Zahabi). Gaethje (the winning captain) was
      rostered 2/10 but captained 0/10; Ruffy (4% own, 177.3 pts — the slate-defining smash)
      appeared in 1/10 and was captained there AWAY from the optimal core (that build finished
      821st). The winning combination existed across the pool but was never assembled in one
      lineup. This is the volume-independent half of the coverage gap (the captain fix needs
      no extra bullets). Links [[mma-se-2026-06-14-showdown-flex-spine-diversity]],
      [[mma-se-2026-06-14-showdown-trust-cpt-own-not-projected-overall-own]]; the cross-sport
      analog is the golf [[feedback_cpt_anchor_equivalence]] / never-zero-top3-anchor coverage
