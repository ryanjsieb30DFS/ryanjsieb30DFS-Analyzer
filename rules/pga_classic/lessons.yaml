# Lesson ledger — one entry per generalizable lesson. Claude edits during the
# post-autopsy review; the user approves codifications/retirements.
# Lifecycle: hypothesis -> validated -> codified | retired.
# Promotion: 3 mechanism confirmations -> propose codifying into framework.md.
# Retirement: 2 mechanism contradictions -> propose retiring.
# GPP guard: a lost contest is NOT a contradiction; only mechanism failures count.
lessons:
  - id: pga-classic-2026-05-11-never-zero-value-chalk-anchor
    born: "2026-05-11"   # Truist Championship final day (event May 6-11, 2026)
    origin: "autopsies.md — Week 1 Truist Championship, Carry-Forward Note 1 (Aberg blind spot)"
    statement: >
      Never zero-out the model's projection #1 (or a multi-anchor chalk alternative)
      across the entire portfolio. The cost of being wrong about value chalk (zero
      exposure when it wins) is asymmetrically higher than the cost of small exposure
      to it when it loses, so at least one lineup must carry the alternative chalk
      anchor as a hedge.
    status: codified
    confirmations:
      - date: "2026-05-17"
        slate: "PGA Championship at Aronimink"
        note: "Aberg at 30.7% MME exposure delivered 84 FPTS; autopsy explicitly marks the Truist blind spot fully corrected."
      - date: "2026-06-10"
        slate: "Memorial at Muirfield Village (rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026)"
        note: >
          Analysis carried value-chalk Scottie as primary anchor and honored the
          equivalence hedge with one Aberg lineup. Scottie anchored the SE winner and
          5 of the top-10 20-Max winners while Aberg (lean trap) busted entirely —
          the asymmetry the lesson describes played out exactly: small hedge cost,
          large payoff for not zeroing the value chalk.
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          The asymmetry paid through the Anchor-Equivalence hedge, which the analysis
          mandated (Fitzpatrick required in >=1 lineup as the alternative to Fleetwood/
          Rai). Fitzpatrick — the less-popular half of the chalk coin (~12-15% actual
          own) — returned 111.5 FPTS and was THE slate-defining anchor (50% of top
          1,494-field winners, 54.5% of 2,225-field, 81% of 150-max top-100), appearing
          in nearly every winning lineup. Carrying the alternative anchor instead of
          concentrating on the primary value chalk captured the win; the primary value
          chalk (Rai, 2/3) busted (31.0). Not zeroing the alt anchor was the difference
          between a 5% finish and nothing. Third confirming slate of the mechanism.
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          Fourth confirming slate. The Anchor-Equivalence alternative inside the value
          tier — Matt Fitzpatrick (2022 U.S. Open champ, the lower-conviction half of
          the Si Woo/Fitz pair) — was carried 2/6 (NOT zeroed) and was a slate-defining
          anchor: present in winning lineups across both contests (Eagle ranks 2/3/9;
          Mulligan ranks 1/2/8/10). Rory (value-chalk star) was likewise carried 2/6 and
          anchored the Eagle overall winner. The asymmetry held once more — small hedge
          cost, large coverage payoff for refusing to zero the alternative value-chalk
          anchor. (The slate was still capped at ~52nd pct overall, but for the
          orthogonal reason that the mid-owned DIFFERENTIATOR — Wyndham Clark — was
          missed, not because any value-chalk anchor was wrongly zeroed.)
    contradictions: []
    codified_in: "framework.md — Section 6 Anchor Selection Logic (Default policy); philosophy.md — Section 5 Chalk Has a Purpose"
    retired_reason: null

  - id: pga-classic-2026-05-11-leverage-spine-pairing
    born: "2026-05-11"
    origin: "autopsies.md — Week 1 Truist Championship, Carry-Forward Note 2 (JT/Bradley spine)"
    statement: >
      Deploying two coffin-list overweights (>=+10% recommended-vs-projected ownership
      gap) together in the same lineup compounds the leverage advantage: each offers
      ceiling-equivalent exposure to chalk at materially lower duplication risk, and
      pairing them is multiplicative, not additive.
    status: codified
    confirmations:
      - date: "2026-06-10"
        slate: "Memorial at Muirfield Village (rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026)"
        note: >
          The analysis named JT (+18.3 coffin) + Keegan (+14.0) as the near-permanent
          spine. In hindsight: JT + Keegan appeared TOGETHER in the rank-3 20-Max
          winning lineup (537 pts), and Keegan appeared in 3 of the top-10 20-Max
          winners. Two coffin overweights paired at low combined own again showed up
          in winning structures.
    contradictions: []
    codified_in: "framework.md — Section 5 The Leverage Spine; philosophy.md — Section 6 Leverage Is Asymmetric Bet Construction"
    retired_reason: null

  - id: pga-classic-2026-05-11-contrarian-needs-leverage-anchor
    born: "2026-05-11"
    origin: "autopsies.md — Week 1 Truist Championship, Carry-Forward Note 3 (L4 collapse)"
    statement: >
      Contrarian builds stacked with mid-range contrarian picks but no leverage-floor
      anchor are fragile: if 3 of 4 mid-range picks bust around their median, the
      lineup has no margin to absorb misses and no path. Every contrarian build should
      include at least one coffin-list-grade leverage piece as its anchor.
    status: validated
    confirmations:
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          The L3 chaos build was anchored on Finau (+7.4 coffin) per this lesson, with
          Potgieter as the lottery slot. It did NOT collapse the way the Truist L4 build
          did (376 pts, ~mid-field, not a zero) — Finau (77.5) provided the leverage
          floor and Potgieter (4.6% own) hit and appeared in multiple top-10 winners.
          The anchor prevented the all-coin-flips implosion the lesson was born to
          prevent. First mechanism confirmation — caveat: red team flagged L3 as the
          "mildest legal chaos" (zero sub-4% pieces) because the >=2-leverage SE cap was
          applied as a hard cap; the build had a floor but never reached the deep
          (<4% own) contrarian tier the actual winners' tails carried. See the new
          redteam-portfolio-findings hypothesis.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-05-11-portfolio-exposure-cap
    born: "2026-05-11"
    origin: "autopsies.md — Week 1 Truist Championship, Carry-Forward Note 4 (2/4 cap on Reitan)"
    statement: >
      Portfolio exposure caps are correct policy even when they cost upside on a single
      slate (Reitan 124 FPTS capped at 1/4): the cap protects against the reverse
      failure mode where a high-conviction play bombs in every lineup simultaneously.
      Risk management is judged across the sample, not the week.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Section 7 Exposure Caps (Multi-Lineup Portfolios)"
    retired_reason: null

  - id: pga-classic-2026-05-11-track-slate-lock-stat
    born: "2026-05-11"
    origin: "autopsies.md — Week 1 Truist Championship, Carry-Forward Note 5 (winner-in-N-of-M stat)"
    statement: >
      When one player appears in N of N (or a large majority of) winning lineups, that
      is a structural slate truth, not noise. Tracking the "slate lock" stat each week
      and asking whether the player was identifiable pre-slate converts hindsight into
      a repeatable pre-slate scan.
    status: codified
    confirmations:
      - date: "2026-05-17"
        slate: "PGA Championship at Aronimink"
        note: "Top-100 winning-lineup appearance tracking applied (Smalley 73/100, Rai 63/100); directly produced the course-history + sub-5% own scan."
      - date: "2026-06-10"
        slate: "Memorial at Muirfield Village (rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026)"
        note: >
          Stat tracked again: Ryan Gerard in 73.5% of SE top-34 and 66% of 20-Max
          top-100 winners (110 FPTS @ ~11%); J.T. Poston in 38% of 20-Max top-100
          (115.5 @ 2.7%). Neither appeared anywhere in the pre-slate analysis —
          the stat converted that blind spot into this review's new
          form/value-engine hypothesis.
    contradictions: []
    codified_in: "framework.md — Section 10 Tracking Stats ('slate lock' identification rate)"
    retired_reason: null

  - id: pga-classic-2026-05-17-course-history-sub5-scan
    born: "2026-05-17"
    origin: "autopsies.md — Week 2 PGA Championship, Carry-Forward Note 1 (Smalley/Rai blind spot)"
    statement: >
      Players on the course-history boost list with sub-5% projected ownership are
      structurally high-leverage: the field underweights course fit at the bottom of
      the ownership curve, so these plays historically produce slate-defining outcomes
      (Smalley 96.5 FPTS at 10.9%, Rai 117 FPTS at 2.3%). The cross-reference is a
      required pre-build scan.
    status: codified
    confirmations: []
    contradictions:
      - date: "2026-06-10"
        slate: "Memorial at Muirfield Village (rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026)"
        note: >
          At a 0.42-stickiness course (CH clearly predictive), the scan's three
          qualifiers (Vegas 0.8%, Echavarria 2.0%, Horschel 1.9% — all bottom-10
          skill baselines) all busted, while the actual sub-5% slate-definer
          (Poston 115.5 @ 2.7%, 38/100 top winners) and Eric Cole (3.5%, in the
          20-Max winner) were surfaced by the form/value engine, not course
          history. The scan's mechanism (CH boost at the bottom of the ownership
          curve = structural leverage) did not operate; the busts themselves are
          variance, but the scan missing every actual cheap slate-definer is a
          coverage failure. First mechanism contradiction — see the skill-gate
          hypothesis born this slate.
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          Second mechanism contradiction, from the opposite end of the stickiness
          range. At a 0.06-stickiness course CH is pure noise, so the un-gated CH x
          sub-5% scan had no usable signal at all; the cheap slate-definer (Suber,
          102.5 @ 10.24% actual) was produced by the FORM/value engine, with his CH
          boost contributing nothing. Combined with the Memorial (0.42 stickiness, CH
          predictive yet the qualifiers all busted on skill), the scan has now failed
          to surface the actual cheap slate-definer at BOTH a high- and a near-zero-
          stickiness course — the unconditional "CH boost = leverage" mechanism does
          not hold either way. Meets the 2-contradiction retirement/revision bar; the
          working replacement is the skill-gated, form-co-equal version
          (pga-classic-2026-06-10-ch-scan-needs-skill-gate, now validated). See
          Proposed codifications.
    codified_in: "framework.md — Section 2 Slate Diagnostics (required scan) and Section 9 Pre-Submission Checklists"
    retired_reason: null

  - id: pga-classic-2026-05-17-se-leverage-cap-two
    born: "2026-05-17"
    origin: "autopsies.md — Week 2 PGA Championship, Carry-Forward Note 2 + Failure Mode Classification (Keegan/Hatton/Brennan triple stack)"
    statement: >
      Correlated bust risk increases non-linearly past two leverage plays per lineup:
      stacking 3+ high-conviction sub-10% own plays in a single SE lineup concentrates
      bust risk so that individually defensible plays can collapse in unison and leave
      the lineup with no path. Cap the leverage spine at 2 per SE build; distribute
      additional leverage across separate lineups.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Section 4A Critical SE rule; Section 5 Multi-leverage-spine cautionary note"
    retired_reason: null

  - id: pga-classic-2026-05-17-trap-vs-value-chalk
    born: "2026-05-17"
    origin: "autopsies.md — Week 2 PGA Championship, Carry-Forward Note 3 (coffin chalk thesis)"
    statement: >
      Chalk is not one category: trap chalk (overowned relative to projection/coffin
      list) is the easiest fade in the portfolio, while value chalk (correctly owned or
      coffin-underowned) should be overweighted. The coffin list is the primary signal
      for the split — all four top-tier coffin overweights (Rahm, Aberg, Rory,
      Schauffele) hit at the PGA Championship.
    status: codified
    confirmations: []
    contradictions:
      - date: "2026-06-10"
        slate: "Memorial at Muirfield Village (rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026)"
        note: >
          Mechanism mis-sorted the fade side: coffin underweights Reitan (-5.1) and
          Burns (-6.2) plus writer-fade Wyndham Clark were slate-defining or in
          multiple SE top-5 winners (Reitan 96.5 @ ~11%, Clark 102 @ 7.5%). The
          fade labels were premised on projected ownership that never materialized —
          all three came in at 7-11% actual, where "trap chalk" is just mispriced
          leverage. First mechanism contradiction; the split itself still worked at
          the top of the board (Scottie value chalk hit, Aberg trap busted).
    codified_in: "framework.md — Section 6 Anchor Selection Logic (Trap chalk vs value chalk); philosophy.md — Section 5 Chalk Has a Purpose"
    retired_reason: null

  - id: pga-classic-2026-05-17-two-build-max
    born: "2026-05-17"
    origin: "autopsies.md — Week 2 PGA Championship, Carry-Forward Note 5 (15-build iteration cycle)"
    statement: >
      Optimizer/build iteration past the point where structural reads stabilize
      produces marginal noise, not improvement (reads stabilized by Build 6 of 15).
      Two-build maximum per slate: one conviction baseline, one refined version; the
      slate read drives the build, not iteration volume.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Section 11 Quality of Rules Discipline; philosophy.md — Section 11 Quality of Rules Over Quantity"
    retired_reason: null

  - id: pga-classic-2026-05-17-se-primary-contest-selection
    born: "2026-05-17"
    origin: "autopsies.md — Week 2 PGA Championship, Carry-Forward Note 6 (contest selection shift)"
    statement: >
      150-max MME demands lineup-construction precision that coarse-lever optimizers
      cannot deliver, producing diminishing returns relative to cognitive cost.
      Small-portfolio formats (SE primary; 3-max/5-max secondary; occasional 20-max or
      small-portfolio MME) deliver better process discipline at equivalent or superior
      risk-adjusted returns.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Section 1 Contest Selection"
    retired_reason: null

  - id: pga-classic-2026-06-10-ch-scan-needs-skill-gate
    born: "2026-06-10"
    origin: "rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026 — Memorial at Muirfield Village"
    statement: >
      The course-history-boost x sub-5% own scan must be gated on skill baseline:
      qualifiers with bottom-decile ball-striking at a penal course are
      lottery-slot-only material regardless of stickiness, and the slate-defining
      cheap plays instead come from the form/value engine (hot approach numbers,
      value-report flags). At Muirfield (0.42 stickiness) all three CH qualifiers
      were bottom-10 skill and busted, while Poston (115.5 @ 2.7%, value/form
      profile) and Eric Cole (in the 20-Max winner at 3.5%, "5 straight weeks
      gaining approach") were the actual sub-5% slate-definers. The scan should
      cross CH boost AND a minimum skill floor, and the form/value engine should
      be treated as a co-equal source of sub-5% leverage.
    status: validated
    confirmations:
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          Textbook confirmation at a 0.06-stickiness course (CH pure noise here). The
          analysis correctly downweighted the raw CH scan and gated the lone qualifier
          (Suber) in on the FORM line — U.S. Open qualifying medalist, OTT trend — not
          on his CH boost. Suber ($7.0K, 4.6% proj own) returned 102.5 FPTS and was a
          genuine slate-definer (35% of the 1,494-field top winners; 10.24% actual
          own). The skill/form gate produced the cheap slate-definer exactly as the
          lesson predicts; the un-gated CH boost carried no signal at 0.06 stickiness.
          First mechanism confirmation.
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          Second mechanism confirmation, and the cleanest yet — a controlled
          natural experiment on the same slate. Brooks Koepka carried the single
          strongest course-history signal possible (he WON the 2018 U.S. Open at
          this exact course) but had no current form; he came in at 7.2% and BUSTED
          (the analysis's L3/M3 chaos build that leaned on his 2018 trophy finished
          2931/2941). Meanwhile Wyndham Clark — 2023 U.S. Open champ but, decisively,
          in current form — was THE slate-definer: 102.0 FPTS at ~10% own, in
          70.8-79.3% of all winning lineups across both contests. Pedigree without a
          form floor = lottery bust (Koepka); pedigree GATED ON FORM via the
          form/value engine = the slate-definer (Clark). The analysis also correctly
          rejected the pure-CH narrative darts (Cam Smith / Uihlein / Rodgers) and
          the sub-40%-MC amateurs on the gate, and none of them hit — the gate
          worked prospectively too. Origin (Memorial) + 2 confirmations (RBC,
          Shinnecock) = 3 mechanism slates; meets the promotion bar. See Proposed
          codifications.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-10-fade-needs-ownership-to-materialize
    born: "2026-06-10"
    origin: "rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026 — Memorial at Muirfield Village"
    statement: >
      A projected-ownership-based fade (trap chalk, coffin underweight) is
      conditional on the ownership actually materializing. When a fade-listed
      player's real ownership comes in well under projection (sub-12%), the fade
      premise is void and the player is mispriced leverage, not trap chalk. At
      the Memorial, fade-side names Reitan (-5.1 coffin), Burns (-6.2), and
      Wyndham Clark (writer fade) all came in at 7-11% actual own and all landed
      in winning structures (Reitan 96.5, Clark 102). Where late/actual ownership
      signals exist, sanity-check the fade list against them before lock.
    status: validated
    confirmations:
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          The lesson cut against the Large-Field writer's FULL-FADE call on Reitan and
          the analysis kept him 0-1/3 instead of zeroing. Vindicated: Reitan was the
          anchor of the overall slate winner (PATRIOTSFan1230, 565.5, contest 191183283)
          and appeared in multiple top-10 winning lineups across all three contests; a
          full fade would have zeroed exposure to a winning tier-1 anchor for the
          second straight slate (Memorial precedent). First mechanism confirmation.
          NOTE the deeper miss the lesson did NOT prevent: the analysis still
          *preferred Rai over Reitan* at that equivalence tier ("prefer Rai at the
          tier"), and that was backwards — Rai busted (31.0, own rose to ~30%) while
          Reitan hit. The fade-direction was corrected; the relative-weight call inside
          the tier still leaned on the wrong (uncalibrated-coffin) anchor — see the new
          single-vendor-overweight-self-erosion hypothesis.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-10-entered-lineups-must-trace-to-plan
    born: "2026-06-10"
    origin: "rules/pga_classic/history/2026-06-10__pga-classic-6-4-2026 — Memorial at Muirfield Village"
    statement: >
      Lineups entered on DK must trace to the written plan (built or handbuilt
      through the tool), or the deviation must be logged pre-lock with a rationale.
      At the Memorial no lineups.md was archived; the entered SE bore no
      resemblance to the analysis's recommended SE and was structurally over-chalky
      for the field (avg own 17.74 with 1 sub-10% play vs the SE winners' 12.25
      and 2.24) — exactly the structure the written plan avoided (62.6% cumulative
      own, 4 sub-8% pieces). Undocumented deviations cannot be process-graded and
      forfeit the red-team and portfolio-audit safety nets.
    status: validated
    confirmations:
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          The gap recurred, and this time the cost cuts BOTH ways — proving the
          mechanism (undocumented deviations forfeit safety nets and cannot be
          process-graded), not the result. The plan + red team covered exactly three
          lineups (L1 Fleetwood/Clark/Rai/Greyserman/Finau/James, L2 Fitzpatrick/Lowry/
          Rai/Cauley/Fisk/Suber, L3 Rose/Lowry/Thorbjornsen/Cole/Finau/Potgieter). The
          user entered SIX distinct lineups; three were off-plan and red-team-unseen:
          (a) Fleetwood/Hall/Bridgeman/Cole/Cauley/Finau — the user's BEST lineup of the
          slate (495 pts, rank 78/1494, 5.2%; rank 2965/59453, 5.0%), Rai-free, which
          dodged the slate's biggest bust; (b) Fitzpatrick/Rai/Bridgeman/Meissner/Cauley/
          Finau (469.5); (c) Rose/Reitan/Rai/Taylor/Theegala/Pendrith — the user's WORST
          (349.5, 70.9%), a triple-anchor Rai+Reitan+Rose chalk-correlation build a red
          team would very likely have flagged KILL. lineups.md was again not archived
          (manifest "missing": ["lineups.md"]). Net: the single best AND single worst
          entries both bypassed the red-team net and have no recorded thesis — the best
          one cannot even be credited as process (we don't know if Rai-fade was reasoned
          or incidental). First mechanism confirmation; the traceability gap is now a
          two-slate pattern.
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          Second mechanism confirmation — the CONVERSE/positive demonstration, and the
          first slate where the gap CLOSED. All six entered lineups trace exactly to
          the archived lineups.md (E1=L6, E2=L4, E3=L5, M1=L2, M2=L1, M3=L3), lineups.md
          AND red_team.md were both archived (manifest 'missing': []), and the red-team's
          one FIX verdict (L1 Woodland -> Kitayama) actually reached the entered M2
          lineup (Kitayama in, Woodland out). Because the lineups traced, the slate is
          FULLY process-gradeable for the first time in three slates and the red-team
          safety net functioned end to end — exactly the value the lesson asserts is
          forfeited when deviations go undocumented. The corrective behavior the prior
          two slates lacked was adopted here. Origin (Memorial, gap born) + RBC (gap
          recurred, mechanism confirmed negatively) + Shinnecock (gap closed, mechanism
          confirmed positively) = 3 mechanism slates; meets the count. See Proposed
          codifications for the post-pivot caveat.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-13-winning-structure-13own-2to3-darts
    born: "2026-06-13"
    origin: "bulk mining — 168 Classic DK contest-standings slates 2023-2026 (rules/pga_classic/mining_2023_2026.md)"
    statement: >
      The Classic winning lineup structure is ~13% average PER-PLAYER ownership
      (mean of the 6 golfers' field own%, ~78% cumulative — NOT a lineup total) with
      2-3 sub-10%-owned golfers and is 91% unique. Mechanism: the 2-day-plus-cut format
      carries enough variance that an all-chalk lineup cannot separate from the
      field; multiple leverage plays are structurally required to win, and sharing
      the field's obvious core (duplication) caps upside. Large-sample confirmation
      of the framework's leverage-spine / ownership-tier targets (the existing
      "12.25 own / 2.24 sub-10%" SE reference holds across 168 slates).
    status: codified
    confirmations:
      - date: "2026-06-13"
        slate: "168-slate mining 2023-2026"
        note: >
          Median winners per-player avg-own 12.9% (stable 12.8-13.2% every year); median 2.5
          sub-10% golfers; 91% of rank-1 winners ran >=1 sub-10% and 78% ran >=2;
          winners 91% unique.
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          Single-slate confirmation across all three contests: top-20/22 winners' mean
          per-player own 13.38% (1,494) / 13.59% (2,225) and top-100 12.33% (59,453),
          mean sub-10% count 1.85 / 1.95 / 1.83, unique 100% / 100% / 74% (the 74% is
          the 150-max where mass-multi-entrants duplicate). Dead-on the ~13% own / 2-ish
          sub-10% / high-unique baseline. The user's entries averaged ~15-16.5% own
          (avg_own_delta -1.4 to -3.12 vs winners) — slightly above the winning
          envelope, dragged up by the Rai/Rose chalk that busted.
    contradictions: []
    codified_in: "framework.md — Section 3 Ownership Tier Framework (empirical winning-structure baseline)"
    retired_reason: null

  - id: pga-classic-2026-06-13-leverage-play-mandatory
    born: "2026-06-13"
    origin: "bulk mining — 168 Classic slates 2023-2026 (mining_2023_2026.md)"
    statement: >
      Every Classic slate has a 'slate-defining' low-owned play: 96% of slates
      (161/168) featured >=1 golfer rostered in >=30% of winning lineups while
      drawing <20% field ownership (median ~12% own, ~108 FPTS, median 4 per slate).
      Mechanism: GPP golf winners are defined by the sub-radar golfer who smashes;
      the build job is to identify and roster the leverage tier, not avoid it. An
      all-chalk lineup is a structural non-starter.
    status: codified
    confirmations:
      - date: "2026-06-13"
        slate: "168-slate mining 2023-2026"
        note: "161/168 slates (96%) had >=1 <20%-own play in >=30% of winners; median 4 per slate."
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          Confirmed: the slate's defining plays were the sub-20% smashes Cauley
          ($7.8K, 135.5 FPTS, 13-17% own, in 55-95% of top winners), Fox ($7.8K, 103.5,
          ~11-12%, 31-44%), Suber ($7.0K, 102.5, ~10%, 35%), and Bridgeman ($8.1K, 84.5,
          ~16%, 34-40%) — four cheap leverage smashes, matching the lesson's "median 4
          per slate." The user rostered Cauley, Suber, and Bridgeman heavily, which is
          why the best entries reached ~5%; missing Fox and the very-cheap winners
          (Sudarshan Yellamaraju, Pendrith, Potgieter, Nakajima in the top-10) kept them
          out of the top 1%.
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          Confirmed again, and a textbook case of the cost of the scan MISSING its
          target. The slate's defining low-owned smash was Wyndham Clark ($-mid, 102.0
          FPTS, ~9.9-10.5% own — under the 20% line — in 70.8-79.3% of all winners),
          with Hatton (69.5, 14.9%, 33% of top lineups) as a secondary. The structural
          truth held (a sub-20% smash defined the slate, as it does in 96% of slates),
          but the build's mandatory low-owned-smash scan did not surface Clark at all —
          zero exposure across 6 lineups — which is precisely why the slate capped at
          ~52nd pct. The scan must not just confirm 'a smash will exist'; it has to NAME
          the candidate. See [[pga-classic-2026-06-24-major-pedigree-in-form-leverage]].
    contradictions: []
    codified_in: "framework.md — Section 2 Slate Diagnostics (mandatory low-owned-smash scan)"
    retired_reason: null

  - id: pga-classic-2026-06-13-dose-darts-to-course-variance
    born: "2026-06-13"
    origin: "bulk mining — 168 Classic slates 2023-2026 (mining_2023_2026.md)"
    statement: >
      Calibrate the NUMBER of sub-10% leverage plays to course variance: birdie-fests
      (high winning scores) reward ~2 darts, tough courses ~3. Mechanism: when the
      field's chalk also scores (low scoring/cut variance), over-leveraging forfeits
      points the chalk banks; on tough courses, differentiation via low-owned plays
      matters more. Average per-player ownership stays ~13% across archetypes — the dart COUNT
      shifts, not the overall own target.
    status: hypothesis
    confirmations:
      - date: "2026-06-13"
        slate: "168-slate mining 2023-2026 (archetype split)"
        note: "Tough (n=57) rank-1 sub-10% median 3 / winners <10% mean 2.59; birdie-fest (n=56) median 2 / 2.16."
      - date: "2026-06-17"
        slate: "RBC Canadian Open at TPC Toronto Osprey Valley North (rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26)"
        note: >
          Ambiguous single-slate data point, logged for honesty rather than forced into
          a verdict. The venue's birdie-fest baseline is weather-dependent and the R4
          read flagged it playing TOUGHER than 2025, yet winners ran the birdie-fest
          dart count (~1.83-1.95 sub-10% across the three contests, i.e. ~2), and Sunday
          scoring opened up (winning lineup totals 565.5-620.5 with several cheap golfers
          posting 100+). Read: a setup that played moderately tough still rewarded the
          ~2-dart birdie-fest structure — mild support for the ~2 default when scoring
          is reachable, but NOT clean evidence for the tough->3 branch (the course never
          fully closed up). Treat as a half-confirmation of the ~2 end only.
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          Refinement data point at the tough/penal end. Shinnecock was an unambiguously
          tough course (penal U.S. Open, ~even-par-ish, 36-hole cut to top 60+ties), so
          the lesson predicts the tough -> ~3-dart branch. Winners instead ran ~2.1-2.7
          sub-10% pieces (Eagle top-24 low_own_count_mean 2.08; Mulligan top-29 2.69) —
          between the ~2 birdie-fest and ~3 tough targets, NOT a full 3. Likely
          mechanism for the shortfall: the 36-hole cut is a hard governor on dart count
          — every sub-10% cut-coinflip you add multiplies binary cut-out risk, so a
          penal CUT course cannot safely carry the full ~3 a non-cut tough course might.
          Proposed refinement (not a verdict on one slate): branch the dart count on cut
          format as well as scoring variance — tough+cut caps closer to ~2-2.5, not 3.
          Our entered builds sat at low_own_count 2.0-3.0 (portfolio mean ~2.8), right in
          the winning band on COUNT — the miss was dart SELECTION, not dart count.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-17-single-vendor-overweight-self-erosion
    born: "2026-06-17"
    origin: "rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26 — RBC Canadian Open (red_team.md P1, confirmed by Rai)"
    statement: >
      A headline edge built from a SINGLE uncalibrated vendor's internal disagreement
      with itself — the vendor's published optimal exposure minus that SAME vendor's
      ownership projection (e.g. ETR's Rai "+25.3 coffin" = 50.2% optimal minus 24.9%
      own) — is self-eroding and should be sized as a note, not the portfolio's biggest
      bet. Mechanism: in a low-buy-in contest drawing that vendor's subscribers, actual
      ownership drifts UP toward the published optimal, so the "overweight" compresses
      toward zero exactly when it is most-owned; and with no calibration row, there is
      no evidence the vendor projects ownership well in the first place. This is the
      mirror image of fade-needs-ownership-to-materialize: an overweight needs ownership
      to stay LOW to pay. At the RBC, Rai was carried 2/3 as "the lock of the slate,"
      came in at ~25-30% actual own (ABOVE ETR's 19.4-24.9% projection), and busted
      (31.0 vs 71.2 proj). The red team named this pre-lock (P1) on a SHIP'd lineup; it
      was the single biggest miss of the slate. Guard: when the edge is one vendor's
      self-referential gap, cap exposure and require a second, independent reason
      (form, skill, course-fit) before treating it as conviction.
    status: hypothesis
    confirmations: []
    contradictions:
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          First mechanism contradiction. The analysis invoked this lesson to OVERRIDE
          ETR's coffin "HAMMER Sam Burns (+21.5)" down to a full PASS (Burns 1/6 in
          the entered pool, never a core). The lesson's falsifiable prong — actual
          own drifts UP toward the published optimal, compressing the overweight —
          demonstrably did NOT fire for Burns: he came in at 19.18% actual vs ETR's
          19.2% projection (dead flat, zero drift), AND he hit (77.0 FPTS, in 62.5%
          of the Eagle top-24 winners) — the slate's #2 defining play. Fading a
          coffin overweight whose own stayed flat AND who had a genuine floor on a
          penal cut course cost a slate-definer. This is the mirror of
          [[pga-classic-2026-06-10-fade-needs-ownership-to-materialize]]: just as a
          FADE needs its projected ownership to materialize, an overweight-FADE needs
          the projected own-INFLATION to materialize — absent a reason to expect the
          own to rise (Burns was a stable, floored value-chalk play, not a trendy
          rising name), the self-erosion override should NOT fire and the default
          reverts to [[pga-classic-2026-05-17-trap-vs-value-chalk]] (play the coffin
          overweight). DISCRIMINATOR vs the RBC origin (Rai), where the lesson was
          right: Rai's own DREW UP to ~30% (drift fired) and he busted; Burns's own
          held flat (drift did not fire) and he hit. REFINED GUARD: only let
          self-erosion override "play the coffin overweight" when there is a concrete
          reason to expect the own to inflate (narrative/trendy/rising late own); a
          floored value-chalk play already sitting at stable projected own is not a
          self-erosion fade. GPP guard satisfied: the contradiction is logged on the
          falsified own-DRIFT prediction, not on the loss itself.
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-17-leverage-spine-needs-sub20-combined-own
    born: "2026-06-17"
    origin: "rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26 — RBC Canadian Open (red_team.md L2 attack)"
    statement: >
      The codified leverage-spine-pairing mechanism (two coffin overweights paired =
      multiplicative, not additive) only operates when the pair is sub-~19% COMBINED
      ownership — the JT+Bradley validation pair that birthed the lesson was sub-19%
      combined. The multiplicative edge comes from the DUPLICATION discount, which does
      not exist at chalk ownership. Pairing two value-chalk plays at 40%+ combined own
      (RBC: Rai ~25% + Cauley ~17.5% = ~42%) is NOT a leverage spine — it is two
      correlated chalk bets wearing a leverage costume, carrying full chalk-bust
      correlation with none of the duplication discount. At the RBC the "spine" split:
      Cauley smashed (135.5) but Rai busted (31.0), and the pair's combined ownership
      meant no uniqueness was bought. The red team flagged the mislabel pre-lock.
      Proposed gate: only call a pair a "spine" when combined large-field own is
      <=~19%; above that, treat each leg as standalone chalk and size on its own merit.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-17-mid-owned-value-spine-over-darts
    born: "2026-06-17"
    origin: "rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26 — RBC Canadian Open (sharp gap analysis vs cantfademe/Stonesalltheway/Jsf900/TheMish in the 59,453 large field)"
    statement: >
      At a value-defined course, the large-field GPP is won by the MODERATELY-owned
      (~10–16%) mid-priced multipliers, not by anchor selection or by deep sub-5% darts
      alone. Mechanism: when a cheap-to-mid tier is genuinely the slate's best points-per-
      dollar, those plays draw 10–16% ownership (not <5%) yet still post ceiling — so the
      edge is having FULL exposure to every 100+-ceiling play in that own band, while the
      field over-allocates to the expensive chalk anchors. At the RBC the winning spine was
      Cauley (135.5/13.6%), Matt Fitzpatrick (111.5/14.9%), Ryan Fox (103.5/12.0%) and
      Sudarshan Yellamaraju (102/10.4%) — Cauley in 15/15 top lineups, Fox 9/15, Yellamaraju
      7/15. Our 6 builds had Cauley on the top 3 (which reached ~5%) and NONE on the bottom 3
      (a perfect 5%-vs-53%+ split), but had ZERO exposure to Fox or Yellamaraju on any build —
      the single biggest pool gap, ~70 points short of the take-down tier. The winning sharps
      made this spine their backbone at every entry (TheMish 31% Cauley; Stonesalltheway 80%
      Bridgeman/75% Fitzpatrick) and added ONE sub-1% dart (cantfademe's single: spine +
      Potgieter 6.4% + Nakajima 0.71% beat our entire portfolio). The sharp who leaned the
      expensive busted chalk instead (Jsf900: Fleetwood 44%/Rai 35%/Reitan 25%) finished worst.
      Guard/expression: pool generation must GUARANTEE exposure to every mid-priced play with a
      100+ ceiling projected in the ~10–16% own band before adding deep darts; the sub-5% dart
      is the finishing piece on top of a complete value spine, not a substitute for it. Distinct
      from leverage-play-mandatory (which is about the sub-20% smashes) — this is specifically
      that the 10–16% own band, not just <5%, is where value-course slates are won.
    status: hypothesis
    confirmations:
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          First mechanism confirmation, cross-archetype (penal major, not a value
          course — the mid-owned-multiplier mechanism held anyway). The slate was
          decided by a ~10%-owned mid-priced multiplier: Wyndham Clark, 102.0 FPTS at
          ~9.9-10.5% own, in 70.8-79.3% of ALL winning lineups across both contests —
          layered on top of elite anchors (Rory/Xander/Fleetwood/Fitzpatrick), exactly
          the 'elite anchor + one mid-owned differentiator' winning shape. The other
          definers were also mid-owned multipliers, not deep darts: Burns (77.0, 19%)
          and Hatton (69.5, 14.9%). Our portfolio had ZERO Wyndham Clark on any of the
          6 entered lineups, and our value-spine SELECTION (Kitayama/English/Spaun/
          McNealy/Morikawa/Hovland) — though correctly rostered in the 10-16% band per
          [[pga-classic-2026-06-17-design-exposures-before-lineups]] — caught none of
          the actual hitters. This is the THIRD STRAIGHT slate where the actual
          cheap/mid slate-definer was absent from our pool entirely (Memorial:
          Poston/Cole; RBC: Fox/Yellamaraju; Shinnecock: Clark). Mechanism confirmed
          (the band is where it is won) but with a sharp caveat that keeps it a
          hypothesis: owning the band is necessary, not sufficient — we keep owning the
          WRONG members of it. The identification gap is the subject of the new
          [[pga-classic-2026-06-24-major-pedigree-in-form-leverage]] hypothesis.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-17-design-exposures-before-lineups
    born: "2026-06-17"
    origin: "rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26 — RBC Canadian Open (sharp gap analysis, volume-controlled: how Stonesalltheway/TheMish/cantfademe pools were constructed vs our 6)"
    statement: >
      A multi-lineup portfolio should be built by deciding TARGET EXPOSURES FIRST — a
      designed core (the value spine) carried at a deliberate rate across the set, with
      only the differentiators rotated — NOT by assembling N independent rosters and
      hoping the aggregate is coherent. Mechanism: independent assembly has no exposure
      governor, so the slate's best value gets under-rostered (it competes for slots with
      every other idea) and structurally-bad lineups (e.g. stacking multiple chalk anchors)
      slip in unchallenged because nothing is enforcing portfolio-level shape. Designing
      exposures first guarantees the spine is on every lineup, caps the busted-chalk legs,
      and forces each lineup to differ only where intended. Controlling for entry volume,
      this is what separated the winning sharps from us at the RBC: Stonesalltheway's pool
      shared a deliberate Bridgeman+Greyserman+Davis-Thompson core and rotated only the
      finishers; TheMish ran 31% Cauley as a backbone. Our 6 builds read as 6 separate
      ideas — Cauley on only 3/6, zero Fox/Yellamaraju, and a quadruple-chalk-anchor worst
      build that no exposure framework would have allowed. NOTE the volume control: this is
      NOT "enter more lineups" — cantfademe expressed a designed single bullet (spine + 1
      sub-1% dart) and beat our entire portfolio. The fix applies to a 6-lineup or even a
      1-lineup build. Expression: before building, write the target exposure for the value
      spine (every lineup), the mid-owned multipliers, the dart pool, and an explicit CAP
      on each expensive chalk anchor; then fill lineups to those targets. Distinct from
      mid-owned-value-spine-over-darts (which is WHICH players to roster) — this is the
      portfolio CONSTRUCTION METHOD (exposures-first) that gets them rostered consistently.
    status: hypothesis
    confirmations:
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          First mechanism confirmation — the exposures-first method was actually
          executed this slate (red-team-enforced) and produced exactly the coherent
          portfolio the lesson promises, with the RBC failure mode (an incoherent
          quadruple-chalk-anchor build slipping in unchallenged) NOT recurring. The
          build wrote target exposures before selecting pool rows (Scottie 2/6, Rory
          2/6, Fitz 2/6, Si Woo capped 1/6, Rai 0/6, value band guaranteed); the red
          team caught two exposure failures pre-lock and BOTH were fixed in the
          entered lineups — P1 (Kitayama AND English 0/6) was closed by re-selecting
          L1 (Woodland -> Kitayama; English also rostered), and an emergent undesigned
          Spieth 3/6 was trimmed to a designed 2/6 (L5 Spieth -> Lowry). Result: all 6
          entered lineups were unique, traceable, and on the ~12% own envelope, and
          the single worst entry (M3, 142.5, 2931/2941) was a DELIBERATELY DESIGNED
          deep-contrarian build, not an accidental rogue roster — the opposite of the
          RBC quad-anchor accident. The construction method worked; the portfolio's
          shortfall was player IDENTIFICATION (no Wyndham Clark anywhere), which is the
          domain of [[pga-classic-2026-06-17-mid-owned-value-spine-over-darts]] and the
          new [[pga-classic-2026-06-24-major-pedigree-in-form-leverage]], not of the
          exposures-first method. GPP guard: logged as a mechanism (coherence-preserved)
          confirmation, independent of the result.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-17-act-on-redteam-portfolio-findings-on-ship
    born: "2026-06-17"
    origin: "rules/pga_classic/history/2026-06-17__pga-classic-rbc-canada-6-12-26 — RBC Canadian Open (red_team.md P1/P2 vs actuals)"
    statement: >
      Red-team PORTFOLIO-level findings (the P-series) deserve a documented pre-lock
      response even when every per-lineup verdict is SHIP — a SHIP verdict means "no
      single legal roster change improves this lineup," NOT "the portfolio has no
      exposure worth addressing." At the RBC all three lineups were SHIP'd, yet the two
      biggest actual failure modes were both named in the portfolio findings: P1 (Rai
      self-eroding overweight) — Rai busted and his own rose to ~30%; and P2 (the
      accuracy-thesis monoculture leaves a bomber leaderboard beating all three at once)
      — bombers Potgieter (4.6% own) and Pendrith featured in multiple top-10 winners
      while the build faded the distance scenario almost entirely. SHIP-but-flagged is
      a signal to add a documented hedge or cap at the portfolio layer (e.g. one
      bomber-leaning lineup, a Rai exposure cap below 2/3), not a clean bill of health.
    status: hypothesis
    confirmations:
      - date: "2026-06-24"
        slate: "U.S. Open at Shinnecock Hills (rules/pga_classic/history/2026-06-24__pga-us-open-2026)"
        note: >
          First mechanism confirmation, procedural. The red team raised P1
          (Kitayama AND English 0/6 — the named value engines zeroed despite the
          checklist claiming the spine was designed) on an otherwise 5-of-6-SHIP
          portfolio, and this time the SHIP-but-flagged finding got a documented
          pre-lock RESPONSE rather than a pass: L1 was re-selected (Woodland ->
          Kitayama) and the fix actually reached the entered M2 lineup (Kitayama +
          English both in). The mechanism — a SHIP verdict does not absolve a
          portfolio-level exposure gap — was honored end to end. IMPORTANT CAVEAT
          that keeps it a hypothesis: acting on the finding only helps if the finding
          names the right players, and here it did not surface the slate-definer
          (Wyndham Clark) — both the build AND the red team were inside the
          single-vendor (ETR) bubble, so the closed gap (Kitayama/English) caught none
          of the actual hitters. P2 (tee-time/draw blindness on a wind-defense major)
          was documented but not acted on; it remains un-graded (no wave-scoring data
          in the autopsy). Confirms the act-on-findings discipline; does not yet
          confirm it changes outcomes.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: pga-classic-2026-06-24-major-pedigree-in-form-leverage
    born: "2026-06-24"
    origin: "rules/pga_classic/history/2026-06-24__pga-us-open-2026 — U.S. Open at Shinnecock Hills (Wyndham Clark slate-definer blind spot)"
    statement: >
      At a major specifically, a recent major champion who is ALSO in current form but
      drawing sub-15% ownership is a systematic leverage blind spot. Mechanism: the
      field and the primary projection source anchor on season-long baseline form and
      under-credit 'major gear' — proven major closers re-find a higher ceiling at the
      majors — so the in-form recent champ is both under-projected and under-owned, the
      exact profile of a slate-defining mid-owned multiplier. This is pedigree GATED ON
      FORM (the discriminator from [[pga-classic-2026-05-17-course-history-sub5-scan]],
      now retired/revised, and the partner of
      [[pga-classic-2026-06-10-ch-scan-needs-skill-gate]]): pedigree WITHOUT current
      form is a lottery bust, pedigree WITH form is the play. Born from Shinnecock,
      where Wyndham Clark (2023 U.S. Open champ, in form, ~10% own) posted 102.0 and
      appeared in 70.8-79.3% of all winners while being ABSENT from our entire analysis
      and all 6 lineups — the single biggest miss of the slate — whereas Brooks Koepka
      (2018 Shinnecock champ but cold/LIV-rusty, 7.2% own) busted. Supporting prior:
      Matt Fitzpatrick (2022 U.S. Open champ, in form) was a slate-definer at BOTH the
      RBC and here. Proposed scan: at every major, explicitly list recent major
      champions (last ~5 yrs), gate each on a current-form floor, and flag any that
      survive the gate at sub-15% projected own as a leverage play — do NOT rely on the
      single vendor's projection/coffin to surface them (it systematically will not).
      Distinct from [[pga-classic-2026-06-17-mid-owned-value-spine-over-darts]] (which
      says the 10-16% band is where slates are won) — this names a repeatable SOURCE for
      an under-projected member of that band at majors.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null
