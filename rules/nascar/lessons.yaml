  - id: nascar-2026-07-12-narrative-suppressed-elite-is-leverage
    born: "2026-07-12"
    origin: "rules/nascar/history/2026-07-12__eero-400-at-chicagoland-speedway-7-5-2026/autopsy_review.md"
    statement: >
      When the articles AND the field converge on an org-hierarchy narrative that
      demotes an elite team at a track type where that team holds a CODIFIED
      structural edge, the narrative does not lower the team's ceiling — it lowers
      its OWNERSHIP, turning the demoted team's top driver into a low-owned elite
      (leverage), not a fade. Chicagoland: the DDD "JGR/23XI unfuckwithable, HMS a
      clear step off in 2026" org read led the strategy to demote the codified
      HMS-intermediate edge and file William Byron as an "MME contrarian, not the
      primary path"; the field read the same narrative and left Byron at 10-13%
      own; Byron then scored 85.25 (slate high) and was in 40-80% of winning
      lineups. Mechanism: a shared narrative compresses ownership on a
      structurally-elite driver, so the codified track-type edge should OVERRIDE a
      single slate's article org-opinion, and the ownership discount the narrative
      creates is precisely the edge to buy. Pre-lock: do not let one slate's
      article org-tier read demote a codified structural track-type lesson; when it
      does, treat the narrative-suppressed elite as a leverage PLAY, not a
      contrarian afterthought. Complements [[nascar-2026-05-01-hms-intermediate-double-up]],
      [[nascar-2026-05-17-mechanism-check-before-reapplying-patterns]] and
      [[nascar-2026-05-24-anchor-equivalence]].
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null
