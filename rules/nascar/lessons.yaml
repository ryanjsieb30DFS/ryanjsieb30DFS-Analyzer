  - id: nascar-2026-05-17-mme-or-fade-means-fade-in-se
    born: "2026-05-17"
    origin: "philosophy.md — On Reading the Source Material (Dover All-Star lesson)"
    statement: >
      "MME or fade" in Dustin's Deep Dive is a deliberate marker for drivers
      with win equity but bad expected value: in MME the portfolio's variance
      absorbs them across 1-2 lineups, but a single-entry lineup that must win
      1-of-N cannot — so "MME or fade" means fade in single entry, full stop.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "philosophy.md — On Reading the Source Material; framework.md — Step 6 check #6 + Quick-Reference Decision Heuristics"
    retired_reason: null

  - id: nascar-2026-05-17-mechanism-check-before-reapplying-patterns
    born: "2026-05-17"
    origin: "philosophy.md — On Reading the Source Material + On Process Discipline (Dover lesson)"
    statement: >
      Autopsy patterns don't transfer across track types unless the underlying
      mechanic transfers: Texas Ty Dillon worked because a chaotic intermediate
      created natural PD chaos, a mechanic absent at high-banked concrete Dover.
      Before applying any prior lesson ask "what mechanic made it work, and is
      that mechanic present here?" — pattern recognition without a mechanism
      check is superstition, and confident citation of prior patterns is how
      lessons get misapplied at speed.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "philosophy.md — On Reading the Source Material + On Process Discipline; framework.md — Quick-Reference Decision Heuristics (autopsy patterns require mechanism check)"
    retired_reason: null

  - id: nascar-2026-05-17-se-and-mme-built-separately
    born: "2026-05-17"
    origin: "framework.md — Step 4 Contest-Specific Construction (Dover lesson)"
    statement: >
      Single Entry and MME are different lineup archetypes because SE cannot
      rely on portfolio variance to absorb bust risk: SE needs floor and ceiling
      in the same lineup, 1-2 leverage spots all with positive evidence, no
      "MME or fade" drivers, and max 2 must-advance drivers in formats with
      stage cuts. Build them separately; 3+ must-advance per lineup is
      acceptable only for MME.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Step 4 Single Entry vs MME construction + Step 5 must-advance concentration check; philosophy.md — On Contest-Specific Strategy"
    retired_reason: null

  - id: nascar-2026-05-17-format-overlays-break-scoring-assumptions
    born: "2026-05-17"
    origin: "framework.md — Step 1 Track Profile Assessment (Dover lesson)"
    statement: >
      Format-driven slates (All-Star, stage races, inverts, eliminations) break
      normal dominator/PD scoring assumptions, so the Step 1 track profile must
      explicitly map format overlays before any tiering — otherwise tiers
      inherit assumptions the format has invalidated.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Step 1 (format-driven scoring overlays row) + Quick-Reference Decision Heuristics"
    retired_reason: null

  - id: nascar-2026-05-17-conservative-boost-dock-first
    born: "2026-05-17"
    origin: "framework.md — Iteration Discipline (Dover lesson)"
    statement: >
      Large boost/dock adjustments cascade through the optimizer in
      unpredictable ways (docking Hamlin -3 pushed Elliott to 75% at Dover), so
      use ±1 before reaching for ±5 — small adjustments isolate the variable
      being tested. The boost/dock cascade is real optimizer behavior; respect
      it.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Iteration Discipline (conservative boost/dock first) + The Solver rule mechanics"
    retired_reason: null

  # ---------------------------------------------------------------
  # Charlotte 600 — 2026-05-24 (Slate #3 autopsy: "NASCAR 5.24.26")
  # ---------------------------------------------------------------

  - id: nascar-2026-05-24-anchor-equivalence
    born: "2026-05-24"
    origin: "autopsies.md — Autopsy: NASCAR 5.24.26, Process Lessons #1"
    statement: >
      Chalk-tier anchors at similar ownership are mathematically substitutable
      to the field, so concentrating on one while zeroing the equivalent-profile
      alternative bets the portfolio on a coin flip the field already mispriced
      (Bell 21.9% own scored 87.8 while faded 0/5; Reddick 33.2% own in only
      one lineup). For every chalk-tier (>=20% own) dominator candidate,
      identify the equivalent-profile alternative and run it in at least one
      lineup — a build-time enforced rule, 4-slate-validated across 2 sports.
    status: codified
    confirmations:
      - {date: "2026-07-12", slate: "Chicagoland Speedway", note: "Reddick — the field's over-owned equivalent-profile Toyota dominator (43.6% / 51.2% / 54.2% own across the three contests) — busted to -10.8 FPTS and was in 0% of winning lineups (the #1 fish trap in all three fields), while equivalent dominators Hamlin (70.8) and Byron (85.25) hit. The strategy ran the alternative instead of concentrating on Reddick (Decision 1); the field's concentration on the substitutable anchor was punished exactly as the mechanism predicts. Mechanism confirmation — the codified rule keeps holding, stays codified."}
    contradictions: []
    codified_in: "rules/shared/anchor_equivalence.md; framework.md — Step 6 mandatory check #8; philosophy.md — On Process Discipline (The Anchor-Equivalence Rule cost us Charlotte 600)"
    retired_reason: null

  - id: nascar-2026-05-24-sleeper-spike-floor
    born: "2026-05-24"
    origin: "autopsies.md — Autopsy: NASCAR 5.24.26, Process Lessons #2"
    statement: >
      On NASCAR slates the sub-15% own / sub-$6K slot is where back-of-pack
      starters earn massive place-differential points, and zero coverage of it
      is a structural floor violation — Charlotte had 10 such plays score 20+
      FPTS (Suarez 73.0, Zane Smith 53.5, Gibbs 51.8, ...) and the portfolio
      held none. At least 2 of N lineups must contain a sub-15% own / sub-$6K
      driver projected for >=15 spots of place differential.
    status: codified
    confirmations:
      - {date: "2026-06-20", slate: "Pocono Raceway", note: "Re-scoped to the 11th-30th start band per the Pocono venue file (worse-than-30th is only 9.5% of optimal here) — and the re-scope held: Gilliland P29 ($5.3K, 6.61% own) scored 35.5 and Stenhouse P21 ($5.7K, 7.77% own) scored 34.45, both sub-15%/sub-$6K from the 11-30 band. The deep-back version (P37/P38) did NOT pay (Keselowski 2.0). Confirms both the floor mechanism AND the venue-conditioned re-scope toward mid-pack starts."}
      - {date: "2026-06-28", slate: "Sonoma Raceway", note: "Re-scoped 11-30 band confirmed a third time: Cindric (P23, 6.53% own) 40.0, Stenhouse (P21, 6.28%) 33.0, Custer (P27, 12.45%) 30.45 — three sub-15% mid-pack starters each 20+ FPTS and each in 30-35% of winning lineups; the user captured Stenhouse+Custer in the best lineup (rank 9, 0.3%). NOTE: unlike Pocono, the deep-back version ALSO paid here (Keselowski P35) — see [[nascar-2026-06-28-roadcourse-deepback-revives-on-strategy]]; the mid-pack floor mechanism is unaffected (it is additive, not a deep-back substitute)."}
    contradictions: []
    codified_in: "framework.md — Step 6 mandatory check #9 (sleeper-spike floor)"
    retired_reason: null

  - id: nascar-2026-05-24-sim-roi-not-a-selector
    born: "2026-05-24"
    origin: "autopsies.md — Autopsy: NASCAR 5.24.26, Process Lessons #3"
    statement: >
      Pre-slate Sim ROI rank was anti-informative as a lineup selector on
      NASCAR (Spearman -0.054 vs actual; top-10 by sim ROI averaged below pool
      mean), so selecting by it made the portfolio worse than random. Use the
      Exposure-tab lift score (>1.5 on chalk-tier players) and the
      Chalky-Combos-to-Avoid list as primary selectors; Sim ROI is an
      informational input only.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Step 6 mandatory check #11; philosophy.md — On Process Discipline (Sim ROI is informational, not a selection ranker)"
    retired_reason: null

  - id: nascar-2026-05-24-chalky-combos-scrub
    born: "2026-05-24"
    origin: "autopsies.md — Autopsy: NASCAR 5.24.26, Process Lessons #4"
    statement: >
      Repeating a flagged chalky combo across lineups concentrates the portfolio
      on below-median-ROI chalk co-occurrence — Charlotte's Hocevar+Chastain
      combo ran in 3 of 5 entered lineups and both drivers were 0/50 in winners.
      Before locking, scrub the Chalky-Combos-to-Avoid list and drop any
      2-player combo appearing in 2+ selected lineups from at least one of
      them.
    status: codified
    confirmations: []
    contradictions: []
