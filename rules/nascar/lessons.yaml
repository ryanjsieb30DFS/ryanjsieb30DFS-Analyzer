  - id: nascar-2026-06-28-roadcourse-deepback-revives-on-strategy
    born: "2026-06-28"
    origin: "rules/nascar/history/2026-06-28__sonoma-raceway-2026/autopsy_review.md"
    statement: >
      A low historical deep-back-optimal rate (Sonoma: worse-than-30th = 6.7% of
      optimal across 5 years) is a multi-year BASE RATE, not a per-race lock: on a
      road course a single caution/fuel-strategy sequence can compress the field
      and revive the deep-back place-differential path within one race. Sonoma 2026
      proved it — Keselowski (P35, 24% field own) was in ~7 of the top 10 (490
      field) and both top lineups of the 3567 field, Erik Jones (P32) scored 28,
      Austin Dillon (deep) anchored the 490 winner; winners combined deep-back PD
      WITH mid-pack PD around the SVG/Gibbs dominators. Mechanism: caution timing is
      exogenous to start position and can hand 20+ PD to deep starters regardless of
      the base rate. Pre-lock: do NOT fade a deep-back CHALK on a road course purely
      on a low historical deep-back-optimal rate — treat the deep-back band as live
      (rosterable ALONGSIDE mid-pack PD, not instead of it), and reserve the deep-back
      fade for drivers the FIELD is also low on. Re-scopes
      [[nascar-2026-06-20-midpack-pd-over-deep-back-chalk]].
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: nascar-2026-06-28-injury-narrative-not-a-fade-thesis
    born: "2026-06-28"
    origin: "rules/nascar/history/2026-06-28__sonoma-raceway-2026/autopsy_review.md"
    statement: >
      A physical-injury narrative (Bell's fractured wrist on a precision road
      course) is a risk factor, not a fade thesis — exactly like a backup car. The
      strategy faded Bell (Decision 5, "Bell is the trap," only 12% field own) and
      Bell finished in the #1 OVERALL lineup (beardgrylls, 323.9) plus multiple
      top-10s across all three contests. Mechanism: when the field ALREADY discounts
      a driver for the injury (low own), an elite driver in elite equipment
      overcoming the narrative is a leverage SPIKE, not a trap; the injury lowers the
      floor but does not erase the equipment/skill edge. Demand evidence the injury
      actually degraded output (practice speed, qualifying pace) before fading — a
      narrative alone is not it, and a field-shared narrative fade is negative
      leverage. Complements [[nascar-2026-05-01-backup-car-not-auto-fade]].
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

