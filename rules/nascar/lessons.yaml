# Lesson ledger — one entry per generalizable lesson. Claude edits during the
# post-autopsy review; the user approves codifications/retirements.
# Lifecycle: hypothesis -> validated -> codified | retired.
# Promotion: 3 mechanism confirmations -> propose codifying into framework.md.
# Retirement: 2 mechanism contradictions -> propose retiring.
# GPP guard: a lost contest is NOT a contradiction; only mechanism failures count.
lessons:

  # ---------------------------------------------------------------
  # Texas Motor Speedway — May 2026 (Slate #1)
  # ---------------------------------------------------------------

  - id: nascar-2026-05-01-50-pct-chalk-rule
    born: "2026-05-01"   # Texas slate; only "May 2026" known, 1st used as placeholder
    origin: "autopsies.md — Texas Motor Speedway, Lessons That Generalize #1"
    statement: >
      Drivers at 50%+ ownership at lock deserve at least 33% portfolio exposure
      because the market is rarely that wrong about price/start math at the
      extremes. Fade only on definitive evidence (suspension, withdrawal,
      mechanical issue, confirmed equipment problem); a backup car alone is a
      hedge, not a fade thesis.
    status: codified
    confirmations:
      - {date: "2026-05-01", slate: "Watkins Glen", note: "SVG held at 43% exposure under the rule; SVG scored 78.35 and SVG-in lineups averaged 199.5 vs 158 without."}
    contradictions:
      - {date: "2026-06-20", slate: "Pocono Raceway", note: "SCOPING REFINEMENT (not result-based): Keselowski 52% own (highest on slate) scored 2.0 from P37. The rule's mechanism is 'market rarely wrong about price/START math at the extremes' — but a worse-than-30th starter has NO reliable price/start floor; his entire score is a deep-back PD gamble in a thin optimal bucket (Pocono worse-than-30th = 9.5% of optimal; best-ever NextGen finish from there = Haley 22nd/32). The mechanism that justifies riding 50%+ chalk is absent when the chalk's start is deep-back at a thin-back track — there it is a chalk trap, not market wisdom. Pairs with [[nascar-2026-06-20-midpack-pd-over-deep-back-chalk]]. Single mechanism-scoping note; does NOT trigger retirement (codified, 1 scoping refinement)."}
    codified_in: "philosophy.md — On Ownership Leverage; framework.md — Step 5 Portfolio Review + Quick-Reference Decision Heuristics"
    retired_reason: null

  - id: nascar-2026-05-01-anchor-vs-pivot
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, Lessons That Generalize #2"
    statement: >
      Sub-15%-owned plays are pivots, never a lineup's load-bearing piece,
      because a single low-owned bust should not collapse the lineup's
      structural integrity. Pre-lock test: "If this 10%-owned play scores zero,
      can this lineup still cash?"
    status: codified
    confirmations:
      - {date: "2026-05-01", slate: "Watkins Glen", note: "Bell+Zilisch in 18 lineups averaged 147 pts (deep below cash) when both busted — the rule was violated structurally and the mechanism (load-bearing leverage collapse) played out."}
    contradictions: []
    codified_in: "philosophy.md — On Ownership Leverage; framework.md — Step 5 Portfolio Review + Quick-Reference Decision Heuristics"
    retired_reason: null

  - id: nascar-2026-05-01-correlation-not-substitution
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, Lessons That Generalize #3"
    statement: >
      Two plays addressing similar theses (e.g. two deep-PD drivers at different
      price points and team archetypes) are independent shots at different point
      distributions, not interchangeable substitutes — both can hit on the same
      slate. Rostering one does not "cover" the other.
    status: validated
    confirmations:
      - {date: "2026-06-20", slate: "Pocono Raceway", note: "Nemechek (P8, $5.9K, 9.43% actual own) scored 58.55 AND Erik Jones (P7, $7.5K, 19.85% own) scored 44.2 on the SAME slate — two deep-value PD plays at different prices/teams both hit. Field winner ran Nemechek; #2 ran Nemechek+EJ together. First mechanism confirmation: rostering one did not 'cover' the other."}
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: nascar-2026-05-01-hms-intermediate-double-up
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, Lessons That Generalize #4"
    statement: >
      HMS speed correlates across teammates at intermediate tracks, so a
      Byron+Elliott style double-up captures the same equipment edge twice
      (Byron 43 + Elliott 95.95 cashed L3 at Texas). Track for Kansas, Vegas,
      Charlotte and other intermediates.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Quick-Reference Decision Heuristics (HMS + intermediates -> consider double-up)"
    retired_reason: null

  - id: nascar-2026-05-01-sub-10-punts-over-15-20
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, Lessons That Generalize #5"
    statement: >
      When floors match, the lowest-owned of viable Tier 5 punts is the better
      GPP play because similar output at one-third the ownership is vastly more
      leverage (Ty Dillon 7% own / 29 pts vs Zane 17% own / 33 pts). Scope
      (Dover): sub-10% own is necessary but not sufficient — the mechanism
      requires matching floors AND source-material endorsement; it does not
      transfer to tracks where the field is correctly pricing a structurally
      lower floor.
    status: codified
    confirmations:
      - {date: "2026-05-01", slate: "Watkins Glen", note: "Austin Dillon at 5% field own / $5,800 scored 57.9 as the slate-winning punt — second consecutive slate confirming the mechanism at chaotic tracks."}
    contradictions:
      - {date: "2026-05-17", slate: "Dover All-Star", note: "Mechanism (natural PD chaos) absent on high-banked concrete with brutal passing difficulty; Ty Dillon ranked second-worst on slate and carried a 'MME or fade' warning. Scoping refinement, not a result-based contradiction."}
    codified_in: "framework.md — Step 2 Tier 5 + Quick-Reference Decision Heuristics (punt selection)"
    retired_reason: null

  - id: nascar-2026-05-01-portfolio-gaps-addressed-pre-lock
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, Lessons That Generalize #6"
    statement: >
      An identified portfolio gap is already-diagnosed information the field may
      not have priced; leaving it unaddressed forfeits that edge for free
      (Suarez flagged as a hole pre-slate, not fixed, scored 35.35). If a gap is
      identified, address it in at least one lineup even if construction is
      awkward.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: nascar-2026-05-01-ownership-shift-full-reevaluation
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, Process Notes"
    statement: >
      A major ownership shift (e.g. Blaney 54%->39%) changes the relative-value
      math of every fade and overweight justified against it, so it should
      trigger full re-evaluation of the chalk structure, not be treated as
      confirmation of the existing plan.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: nascar-2026-05-01-bet-sizing-reflects-inverse
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, Process Notes (Bubba decision); Watkins Glen, Process Notes (calibrated confidence)"
    statement: >
      Stated confidence must be expressed in exposure deltas because exposure,
      not language, is the actual bet: "80% confident" with a 47% exposure to
      the contrarian is a near-total commitment to the base case, not 80%
      confidence. High confidence = 10-15pts above field rate; moderate = field
      rate; low = 5-10pts below. High-magnitude fades additionally require
      calibrated language and explicit acknowledgment of the downside scenario.
    status: codified
    confirmations:
      - {date: "2026-05-01", slate: "Watkins Glen", note: "Zilisch at 47% exposure under an '80% confident' label was the slate-defining loss; bet size did not reflect the 20% inverse (SVG dominates), which is what occurred."}
    contradictions: []
    codified_in: "philosophy.md — On Process Discipline (bet sizing reflects probability of the inverse)"
    retired_reason: null

  - id: nascar-2026-05-01-backup-car-not-auto-fade
    born: "2026-05-01"   # Texas slate; only "May 2026" known
    origin: "autopsies.md — Texas Motor Speedway, What We Got Wrong (Bubba fade) + Slate-Specific Notes"
    statement: >
      A backup car is a risk factor, not a fade thesis — it lowers the floor
      modestly but does not erase the price/start PD math that put the driver at
      chalk ownership (Bubba top-5 from P37 in a backup car, 63 pts at 65.58%
      own). Don't auto-fade backup-car drivers; demand positive evidence.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Quick-Reference Decision Heuristics (backup-car driver -> don't auto-fade)"
    retired_reason: null

