  - id: nascar-2026-05-01-thesis-before-iteration
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, Lessons That Generalize #1"
    statement: >
      Optimizer iteration cannot save a portfolio whose foundational thesis is
      wrong, because every build re-expresses the same incorrect bet with
      different exposures. Before iterating on Min/Max or boost/dock settings,
      validate the core strategic thesis; if results feel wrong, re-evaluate the
      thesis, not the construction.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Iteration Discipline (optimizer outputs don't validate or invalidate strategy)"
    retired_reason: null

  - id: nascar-2026-05-01-inverse-thesis-test
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, Lessons That Generalize #2"
    statement: >
      If the contrarian dominator thesis depends on the chalk dominator
      under-performing ("Zilisch wins because SVG's ceiling is capped"), it is
      an absence-of-confidence thesis about the chalk, not positive evidence for
      the contrarian — and it collapses entirely when the chalk's ceiling isn't
      capped. Default to field rate on the chalk and require an independent
      positive win path for the contrarian.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "philosophy.md — On Contrarian Thinking (The Inverse Thesis Test)"
    retired_reason: null

  - id: nascar-2026-05-01-correlated-leverage-one-bet
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, Lessons That Generalize #3"
    statement: >
      Overweights sharing one thesis bust together, so 3+ overweights betting on
      the same outcome (e.g. "Toyota speed beats the SVG/HMS chalk path") are a
      single concentrated bet, not diversified leverage. Count the theses behind
      overweights, not the drivers, and break the correlated stack by reducing
      exposure on at least one.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "philosophy.md — On Contrarian Thinking (correlated leverage stacks); framework.md — Step 5 thesis-count check + Quick-Reference Decision Heuristics"
    retired_reason: null

  - id: nascar-2026-05-01-iteration-discipline
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, Lessons That Generalize #5, #6, #8 + Process Notes"
    statement: >
      Every optimizer build must be justified by a diagnosed structural problem
      and an articulated specific adjustment, because iteration driven by
      discomfort ("I just want to build one more set") is a signal about the
      thesis, not optimization — and marginal differences across builds that
      satisfy the same strategic criteria are noise (lock the first satisfying
      build). Forcing the lock preserves decision integrity even when the
      outcome doesn't validate it.
    status: codified
    confirmations:
      - {date: "2026-05-17", slate: "Dover All-Star", note: "Framework updated: no hard build cap, but each build requires a diagnosed structural problem; the mechanism (discomfort-driven iteration is noise) held and was refined rather than contradicted."}
    contradictions: []
    codified_in: "framework.md — Iteration Discipline (Watkins Glen lesson — updated 5/17/26)"
    retired_reason: null

  - id: nascar-2026-05-01-sound-chalk-toward-field-rate
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, Lessons That Generalize #7"
    statement: >
      When all three structural pillars (price, start, track-fit) confirm a 60%+
      chalk play, field consensus at the extreme is even stronger than modeled —
      target field rate or slightly below, not the 33% floor of the 50% Chalk
      Rule. SVG at 60% field own was correct; holding him to 43% gave 15+
      exposure points of leverage back to the field.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "philosophy.md — On Ownership Leverage (structurally sound chalk expands toward field rate); framework.md — Quick-Reference Decision Heuristics"
    retired_reason: null

  - id: nascar-2026-05-01-track-profile-overweight-cap
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, Process Notes (Zilisch overweight from Step 1 track profile)"
    statement: >
      Track-profile analysis correctly identifies viable win paths, but path
      viability is not path probability — over-extrapolating from "X has a
      positive win path" to "X is the primary slate-winning thesis" turns a
      sound read into an oversized bet. Cap track-profile-derived overweights at
      +10pts above field rate, not +20pts.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "philosophy.md — On Contrarian Thinking (track-profile-derived overweights cap at +10pts)"
    retired_reason: null

  - id: nascar-2026-05-01-hms-road-course-fade
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, What We Got Right (Bowman fade / Byron under-exposure)"
    statement: >
      HMS equipment edge does not translate to road courses, so HMS drivers are
      fades there (Glen: Bowman 20, Larson 19, Byron -17, Elliott 21). The same
      teammate correlation that makes HMS a double-up at intermediates works in
      reverse — the weakness correlates across the org too.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Quick-Reference Decision Heuristics (HMS + road courses -> fade)"
    retired_reason: null

  - id: nascar-2026-05-01-toyota-road-double-up-not-bell
    born: "2026-05-01"   # Watkins Glen slate; only "May 2026" known
    origin: "autopsies.md — Watkins Glen, What We Got Wrong (Bell) + Slate-Specific Notes"
    statement: >
      Toyota road-course speed is real at the org level (Reddick 50.8, Briscoe
      45.45, Gibbs 54.05 all hit at Glen), so a Toyota double-up should be
      expressed through Reddick/Briscoe rather than Bell (8.00) — capture the
