  # ---------------------------------------------------------------
  # Pocono Raceway — 2026-06-20 (Slate #4 autopsy)
  # ---------------------------------------------------------------

  - id: nascar-2026-06-20-midpack-pd-over-deep-back-chalk
    born: "2026-06-20"
    origin: "rules/nascar/history/2026-06-20__pocono-raceway-2026/autopsy_review.md"
    statement: >
      At tracks whose venue history shows the worse-than-30th bucket is a thin
      optimal path and the 11th-30th band is the meat (Pocono: 9.5% vs 57% of
      optimal spots), the optimal place-differential points come from MID-PACK
      (P11-30) high-floor cars, NOT deep-back chalk — and the field's habit of
      piling into deep-back chalk PD leaves the mid-pack band as the leverage.
      Mechanism: a PD ceiling from P11-30 is reliably reachable, while a P37-38
      car needs a near-impossible run (best-ever NextGen worse-than-30th finish =
      Haley 22nd/32). Pre-lock: when the field over-owns deep-back chalk, source
      PD from the 11-30 band instead and do not fade a high-floor mid-pack car on
      track-fit narrative when its start sits in the optimal band.
    status: validated
    confirmations:
      - {date: "2026-06-28", slate: "Sonoma Raceway", note: "The MID-PACK half held strongly: Cindric (P23, 6.53% own) 40.0, Preece (P19, 18.9%) 47.0, Custer (P27, 12.45%) 30.45, Stenhouse (P21, 6.28%) 33.0 — four 11-30-band cars each 20+ FPTS and each in 30-35% of winning lineups; the user captured Stenhouse+Custer in the best lineup (rank 9, 0.3%). Mid-pack PD is real leverage."}
      - {date: "2026-07-12", slate: "Chicagoland Speedway", note: "MID-PACK half held a third time on a fresh intermediate: Cindric (P23) 45.9, Bubba Wallace 60.0, Daniel Suarez 41.5, plus Herbst (P18) and Gilliland (P29) in the top lineups — multiple 11-30-band cars each 20+ FPTS and each in a large share of winners, while the field piled into deep-back chalk. Origin Pocono + Sonoma + Chicagoland = 3 confirming slates for the mid-pack half -> promote to validated; see autopsy_review Proposed codifications (codify the mid-pack-is-the-meat half ONLY). The 'fade the deep-back CHALK' half was again NOT supported: Heim (P28, 46-59% own) scored 55.1 and was in most winners — deep-back chalk paid, consistent with the Sonoma contradiction and [[nascar-2026-06-28-roadcourse-deepback-revives-on-strategy]]."}
    contradictions:
      - {date: "2026-06-28", slate: "Sonoma Raceway", note: "MECHANISM CONTRADICTION of the 'fade the deep-back chalk' half. The venue file's 6.7% deep-back-optimal rate flagged Keselowski (P35, 24% own) as the Pocono trap and the strategy faded him relative to field (Decision 2) — but Keselowski was in ~7 of the top 10 (490 field) and BOTH top lineups of the 3567 field; Erik Jones (P32) scored 28 and Austin Dillon (deep) anchored the 490 winner. Winners COMBINED deep-back chalk WITH mid-pack PD around SVG/Gibbs, they did not substitute one for the other. So 'source PD from mid-pack INSTEAD OF deep-back chalk, fade the deep-back chalk' failed: you needed Keselowski too. Re-scope toward [[nascar-2026-06-28-roadcourse-deepback-revives-on-strategy]] — ADD mid-pack PD, do NOT treat a low multi-year deep-back-optimal rate as a per-race mandate to fade a deep-back CHALK. 1 mechanism contradiction (born Pocono, where it worked); does not trigger retirement."}
    codified_in: "PARTIAL — mid-pack-is-the-meat half codified 2026-07-12 to framework.md — Quick-Reference Decision Heuristics (Mid-pack PD is the leverage meat). Lesson STAYS OPEN (status validated): its literal 'fade the deep-back chalk' half carries the Sonoma mechanism contradiction and was NOT codified."
    retired_reason: null

  - id: nascar-2026-06-20-anchor-equivalence-not-parity
    born: "2026-06-20"
    origin: "rules/nascar/history/2026-06-20__pocono-raceway-2026/autopsy_review.md"
    statement: >
      The Anchor-Equivalence Rule requires the equivalent alternative in AT LEAST
      ONE lineup as coverage — it is not a mandate to split the dominator coin
      flip 50/50. Expanding the alternative to portfolio parity (Pocono: 4 Hamlin
      / 4 Larson when the rule needed only >=1 Larson) converts a coverage
      requirement into a full hedge, leaving the portfolio's win equity in only
      half the lineups when the modal/chalk dominator hits. Mechanism: hedging
      both sides of the dom coin flip guarantees you cannot fully capitalize on
      either outcome (philosophy: "not hedge players"). Pocono: Hamlin (modal,
      P1, 48%) delivered while the 4 Larson lineups capped modal-world equity.
      Size the alternative for leverage (1-2 lineups when the field is mispricing
      it), not for parity. Complements [[nascar-2026-05-24-anchor-equivalence]]
      and [[nascar-2026-05-01-bet-sizing-reflects-inverse]].
    status: codified
    confirmations:
      - {date: "2026-06-28", slate: "Sonoma Raceway", note: "Applied as Decision 1 — SVG (modal/chalk dominator) in ~95% of the user's lineups with Gibbs as the alt in a few, NOT a 50/50 hedge. SVG hit and was in nearly every winning lineup across all three contests, so hedging the dom coin flip to parity would have capped modal-world equity exactly as the mechanism warns; the best lineup (rank 9, 0.3%) ran SVG+Gibbs+Zilisch. First mechanism confirmation — promoted to validated."}
      - {date: "2026-07-12", slate: "Chicagoland Speedway", note: "Second mechanism confirmation. Hamlin (modal P1 dom) was sized as the near-mandatory anchor with Bell/Larson/Briscoe as leverage-sized alternatives, NOT a 50/50 Reddick/Larson hedge (Decisions 1-2). Hamlin hit (70.8) and was in nearly every top lineup, while the two equivalent alternatives the field hedged toward BOTH busted — Reddick -10.8, Larson -12.5. Parity-hedging the dom coin flip to Reddick/Larson would have carried a busted dominator in half the portfolio and capped Hamlin-world equity, exactly the failure the mechanism describes. Origin Pocono + Sonoma + Chicagoland = 3 confirming slates -> meets promotion criteria; see autopsy_review Proposed codifications."}
    contradictions: []
    codified_in: "philosophy.md — On Process Discipline (Coverage, not parity); framework.md — Step 6 mandatory check #8 (Anchor-Equivalence coverage-not-parity amendment)"
    retired_reason: null

  - id: nascar-2026-06-20-carry-a-sub5-leverage-dart-mme
    born: "2026-06-20"
    origin: "rules/nascar/history/2026-06-20__pocono-raceway-2026 (shark_gap.json)"
    statement: >
      In MME NASCAR (10+ entries) at least one lineup should carry a genuine
      sub-5%-owned leverage driver — a low-owned dog with real upside (Tier 4
      mid-pack flex or a position-differential sleeper), not chalk relief. The
      structural shark-gap at Pocono showed the in-field NASCAR sharks (SpartyOn34,
      Hunter4ever89, TLambertFB et al.) carried a sub-5% piece in ~7% of their
      lineups while OUR portfolio carried one in 0% — every lineup sat at or above
      the chalk band, so no roster was positioned to catch a low-owned spike in a
      large field. NASCAR is chalky, so the rate is low (~1 in 14 lineups): this is
      ">=1 deep dart across a 10-bullet portfolio," NOT "a dart in every lineup."
      Scope: MME only — for SINGLE entry the framework's caution holds (a sub-10%
      punt with a Dustin "MME or fade" warning is not a single-entry leverage play).
      Mechanism: in a 25k+ field a portfolio with zero sub-5% exposure cannot reach
      the win tail when a low-owned driver spikes. Caveat: one slate, ~6 shark
      handles — small sample; confirm before codifying. Complements the framework's
      Tier 4 "best leverage tier" and
      [[nascar-2026-06-20-midpack-pd-over-deep-back-chalk]]; measured every slate now
      via src/shark_gap.py (leverage_pct delta vs the in-field sharks).
    status: codified
    confirmations:
      - {date: "2026-06-28", slate: "Sonoma Raceway", note: "Partial confirmation + THRESHOLD scoping. The MME carried low-own pieces (mean low_own_count 1.35 vs 0% at Pocono — shark-gap fixed), and the best lineup (rank 9, 0.3%) carried Stenhouse (6.28%) + Custer (12.45%). But the low-owned spikes that PAID were 6-7% (Cindric 6.53%, Stenhouse 6.28%), NOT sub-5% — and the one genuine sub-5% on the board (Cody Ware, 4%) busted and sank every lineup that carried him (ranks 1007/1024/1359/1420/1900). 'Carry a low-owned leverage dart' is confirmed; the paying threshold here was sub-10%, not sub-5%, on a low-chaos road course. Scope may be track-conditioned: sub-5% at chaos tracks, sub-10% where deep PD needs a caution to materialize. Keep hypothesis."}
      - {date: "2026-07-12", slate: "Chicagoland Speedway", note: "Second confirmation of the carry-a-low-owned-dart mechanism + the sub-10% threshold again. A genuine sub-5% dart reached the absolute win tail: Riley Herbst (4% own) was in the #1 lineup of the 23,461 field (362.5) and multiple other top lineups. But the broader leverage that paid was sub-10%, not strictly sub-5%: Byron (10-13%), Briscoe (6-10%), Gilliland (6%) — same pattern as Sonoma. Meanwhile the user's own leverage_pct shark-gap was -16.7 (still short of the in-field sharks) and one single-entry lineup (490 field) carried ZERO sub-5% pieces — the NASCAR leak persists. Origin Pocono + Sonoma + Chicagoland = 3 confirming slates for the mechanism; threshold has settled at 'sub-10%, sub-5% at chaos tracks' -> promote to validated; see autopsy_review Proposed codifications."}
    contradictions: []
    codified_in: "framework.md — Step 5 Portfolio Review (Carry a low-owned leverage dart in MME)"
    retired_reason: null

