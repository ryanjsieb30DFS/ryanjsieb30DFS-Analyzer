# Lesson ledger — one entry per generalizable lesson. Claude edits during the
# post-autopsy review; the user approves codifications/retirements.
# Lifecycle: hypothesis -> validated -> codified | retired.
# Promotion: 3 mechanism confirmations -> propose codifying into framework.md.
# Retirement: 2 mechanism contradictions -> propose retiring.
# GPP guard: a lost contest is NOT a contradiction; only mechanism failures count.
lessons:
  # autopsies.md is empty (no slates logged yet) — entries below index the
  # operating rules already codified in framework.md. Born dates use 2026-06-01
  # because MLB Classic support was added in 2026-06 and only the month is known.

  - id: mlb-classic-2026-06-01-team-stacking-core-lever
    born: "2026-06-01"   # month known only (sport added 2026-06); 1st used by convention
    origin: "framework.md — Roster & contest facts (autopsies.md is empty; indexed from framework)"
    statement: >
      DK MLB scoring is correlation-driven: hitters on the same team score together
      when the offense goes off, so team stacking — not isolated value — is the core
      construction lever. A stack captures the same run-scoring events multiple times,
      multiplying ceiling in exactly the outcomes a GPP needs.
    status: codified
    confirmations:
      - date: "2026-06-10"
        slate: "rules/mlb_classic/history/2026-06-10__mlb-classic-6-9-26"
        evidence: >
          Mechanism confirmed: winning stack shapes in both SE contests were
          overwhelmingly 5-man-primary builds (5-2-1, 5-3, 5-1-1-1 account for
          11 of 14 shaped top-20 lineups in the $5k and 8 of 11 in the $10K).
          The $5k rank-2 (156.6) and $10K rank-4 (151.35) were both ATL 5-stacks
          capturing Olson's 32-pt game multiple times via Acuna/Harris/Riley.
    contradictions: []
    codified_in: "framework.md — Roster & contest facts"
    retired_reason: null

  - id: mlb-classic-2026-06-01-no-hitter-vs-own-pitcher
    born: "2026-06-01"   # month known only (sport added 2026-06); 1st used by convention
    origin: "framework.md — Roster & contest facts (autopsies.md is empty; indexed from framework)"
    statement: >
      Never roster a hitter against your own pitcher: the two outcomes are negatively
      correlated, so any points the hitter scores come directly out of the pitcher's
      score (and vice versa), structurally capping the lineup's joint ceiling.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Roster & contest facts"
    retired_reason: null

  - id: mlb-classic-2026-06-01-distinct-thesis-per-lineup
    born: "2026-06-01"   # month known only (sport added 2026-06); 1st used by convention
    origin: "framework.md — Lineup discipline (inherited; autopsies.md is empty)"
    statement: >
      Every lineup needs a one-sentence "how it wins" thesis, and lineups in a
      portfolio must answer DIFFERENT questions — distinct stacks/game-environments,
      not the same stack reshuffled. Competing lineups split the same bet across
      entries instead of hedging uncorrelated outcomes.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: "framework.md — Lineup discipline (inherited, applies now)"
    retired_reason: null

  - id: mlb-classic-2026-06-01-anchor-equivalence-check
    born: "2026-06-01"   # month known only (sport added 2026-06); 1st used by convention
    origin: "framework.md — Lineup discipline (inherited; rule lives in rules/shared/anchor_equivalence.md)"
    statement: >
      If a slate has 2+ chalk-tier anchors at similar projected ownership, at least
      one lineup must run the alternative: equivalently-owned anchors are
      substitutable to the field, so the less popular one captures uncontested
      leverage when it outperforms. Mandatory pre-lock check, cross-sport
      (4-slate-validated before MLB was added).
    status: codified
    confirmations:
      - date: "2026-06-10"
        slate: "rules/mlb_classic/history/2026-06-10__mlb-classic-6-9-26"
        evidence: >
          First MLB confirmation of the mechanism at the STACK level: MIL/CHC/ATH
          (86–101% combined own) were flagged anchor-equivalent with ATL (~37%) as
          the alternative. The highest-owned equivalent busted (Turang 0.0 pts at
          ~31% actual own; MIL stacks absent from winners) while the alternative
          anchor landed top-4 in both contests (ATL 5-stacks at ranks 2 and 4).
          Caveat logged: at the PITCHER level the named alternative (Wheeler 9.5%)
          missed while a lower-owned member of the chalk class (Cease, 12.8–16.9%
          actual) was the slate-defining arm — variance, not a mechanism failure,
          but it shows the alternative anchor need not come from outside the class.
    contradictions: []
    codified_in: "rules/shared/anchor_equivalence.md (referenced by framework.md — Lineup discipline)"
    retired_reason: null

  # --- Born from 2026-06-10 post-autopsy review (slate: MLB Classic 6.9.26) ---

  - id: mlb-classic-2026-06-10-pivot-budget-small-field-se
    born: "2026-06-10"
    origin: "rules/mlb_classic/history/2026-06-10__mlb-classic-6-9-26"
    statement: >
      In small-field SE MLB Classic (≤~1,000 entries), winning lineups run
      near-field ownership with ONE structural pivot, not several: top-20
      winners averaged 13.2% own ($5k) and 16.0% own ($10K) with ~4–5 sub-10%
      plays per lineup. Mechanism: a small field cannot cover the chalk
      combinatorics, so chalk-plus-one-pivot separates enough to win; layering
      pivots (mega-stack fade + pitcher pivot + punt fills) out-leverages the
      field and trades ceiling for uniqueness nobody is contesting. The 6/9
      build carried 8 sub-10% plays — double the winners' density — despite the
      slate analysis itself directing "one or two structural pivots beats full
      contrarian" for this field size. Pick ONE primary leverage axis (stack OR
      pitcher); keep the other near-field.
    status: codified
    confirmations:
      - date: "2026-06-11"
        slate: "rules/mlb_classic/history/2026-06-11__mlb-classic-6-10-26"
        evidence: >
          Mechanism confirmed in both SE contests (6/10 slate): top-20 winners
          averaged 15.4% own ($6K, 588 entries) and 16.0% own ($4K SE, 392
          entries) with ~4.9-5.2 sub-10% plays per lineup — the same
          near-field-plus-one-pivot band as 6/9. The ONE pivot was the PHI
          dome stack (Harper 8.5-9.7% own in 65-75% of top-20 lineups);
          pitchers stayed full chalk (Luzardo+Detmers). Dominant winning
          shapes again 5-3 / 5-2-1 / 5-1-1-1.
      - date: "2026-06-12"
        slate: "rules/mlb_classic/history/2026-06-12__mlb-classic-6-11-26"
        evidence: >
          Third mechanism confirmation, with a same-slate controlled contrast
          (6/11 slate): top-20 winners averaged 15.4% own / 3.3 sub-10% plays
          ($5K Chin Music, 1,189 entries) and 18.5% own / 3.6 sub-10% ($5K
          Base Hit, 490) — near-field-plus-one-pivot again. The user entered
          BOTH worlds: the in-band build (L1 NYM-5, 14.0% avg own, one pivot)
          finished top 4.4% — ledger best — while the above-band chalk build
          (L2 CHC-5+TEX-3, 23.1% avg own, no structural pivot) finished
          mid-pack (28.8%) on the SAME slate. Band refinement: winning sub-10%
          density was 3.3-3.6 here vs 4-5 on prior slates — "one pivot,
          roughly 3-5 sub-10% plays" is the working range.
    contradictions: []
    codified_in: "framework.md — Construction (user-approved 2026-06-12)"
    retired_reason: null

  - id: mlb-classic-2026-06-10-salary-enabler-pitcher-chalk
    born: "2026-06-10"
    origin: "rules/mlb_classic/history/2026-06-10__mlb-classic-6-9-26"
    statement: >
      MLB pitcher chalk that is salary-driven (a cheap viable P2 whose price
      unlocks premium bats) is an enabler, not a chalk trap — fading it cuts
      you off from the winning salary structure rather than gaining leverage.
      Discriminate chalk arms by workload/leash (avg IP, K%) instead of by
      ownership alone: on 6/9, Dustin May (28.8% proj own, dismissed as
      "chalk-trap risk") anchored 13 of the 20 listed top-10 lineups across
      both contests, while the short-leash chalk arm Kai-Wei Teng (2.5 avg IP
      flag) busted at 1.8 pts on 27–29% actual own. The analysis's IP-based
      discrimination worked; its ownership-based discrimination did not.
    status: codified
    confirmations:
      - date: "2026-06-11"
        slate: "rules/mlb_classic/history/2026-06-11__mlb-classic-6-10-26"
        evidence: >
          Mechanism confirmed: Reid Detmers ($7,500, 38% proj own) was kept as
          the salary-enabling P2 in the built Lineup 2 explicitly per this
          lesson, and smashed (31.15 FPTS at 68.7% actual own). Both contest
          winners ran the full chalk arm pair (Luzardo+Detmers) and spent the
          savings on the underowned PHI bats — fading the enabler would have
          cut builds off from the winning salary structure. The anti-Detmers
          binary (Lineup 3's HOU strike) hit the wrong world; per the GPP
          guard that bust is not logged as a contradiction of anything, but
          the enabler-keep side of this lesson is now 2-for-2.
      - date: "2026-06-12"
        slate: "rules/mlb_classic/history/2026-06-12__mlb-classic-6-11-26"
        evidence: >
          ENABLER-KEEP half confirmed a 3rd time, by cost this time: Tyler
          Phillips ($6,200, 21.9% proj own) was the slate's cheap chalk
          enabler and the build faded him entirely — he scored 22.85 (slate-
          defining play in BOTH contests, 50-55% of top-20 lineups) and the
          $5K Base Hit winner ran Phillips+Kelly cheap arms to fund the bats.
          Fading the enabler again cut builds off from the winning salary
          structure. NOTE: this same slate contradicted the lesson's LEASH
          clause (see contradictions) — the enabler-keep mechanism and the
          leash discriminator are now diverging halves of one lesson.
    contradictions:
      - date: "2026-06-12"
        slate: "rules/mlb_classic/history/2026-06-12__mlb-classic-6-11-26"
        evidence: >
          The leash discriminator failed as a fade trigger: Phillips's 2.4
          avg IP was the exact Kai-Wei Teng profile the lesson says to fade,
          and the build faded him on that mechanism explicitly ("the leash
          mechanism says fade anyway") — he threw past his leash and put up
          22.85, the slate-defining arm. Leash-as-fade-trigger is now 1-1
          (Teng busted 6/9, Phillips smashed 6/11). Mechanism contradiction
          of the clause "discriminate chalk arms by workload/leash": avg IP
          appears to be a season artifact, not a per-start cap, for cheap
          chalk. First contradiction logged — a second retires the clause.
    codified_in: >
      framework.md — Construction (user-approved 2026-06-12): enabler-keep
      principle codified; leash clause demoted to a risk note in the
      framework text per the Phillips contradiction
    retired_reason: null

  - id: mlb-classic-2026-06-10-blank-own-snapshot-artifact
    born: "2026-06-10"
    origin: "rules/mlb_classic/history/2026-06-10__mlb-classic-6-9-26"
    statement: >
      Blank Own fields in vendor hitter CSVs (seen in the SIN hitter file) flow
      through the auto-snapshot as 0.0% ownership, putting double-digit-owned
      players (Troy Johnston 11.3%, Maikel Garcia 10.1%, Edouard Julien 8.8%
      per The Stone) at the top of the leverage table. Cross-check the
      snapshot's top leverage rows against article ownership before trusting
      them; treat a blank Own as unknown, never as zero. Caught pre-lock on
      6/9 (the analysis discarded the artifact rows), so the mechanism is
      observed at birth — needs confirmation on future slates or an app-side
      fix.
    status: hypothesis
    # 2026-06-12 note (no evidence change): cross-check performed pre-lock on
    # 6/11 — no blank-Own rows in that SIN file (Feltner's 1.04% verified
    # real). The check is doing its job; the artifact hasn't recurred yet.
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mlb-classic-2026-06-10-untracked-entry-bypasses-loop
    born: "2026-06-10"
    origin: "rules/mlb_classic/history/2026-06-10__mlb-classic-6-9-26"
    statement: >
      Every lineup actually entered on DK must exist in data/lineups/<slug>.md
      (Claude-built or handbuilt) before lock. An untracked entry bypasses the
      thesis requirement, the red team, and the portfolio audit, and the
      autopsy then grades a portfolio that doesn't match what was played. On
      6/9 the $5k entry (CHC 5-3 Coors chalk with Teng+May: Busch/Bregman/
      PCA/Suzuki/Ballesteros + Castro/Tovar/McCarthy) appears nowhere in the
      archived lineups.md, which claimed "same lineup in both SE contests."
      Process mechanism, not a results claim: the loop can only improve
      lineups it can see.
    status: codified
    confirmations:
      - date: "2026-06-11"
        slate: "rules/mlb_classic/history/2026-06-11__mlb-classic-6-10-26"
        evidence: >
          Second consecutive slate (6/10): BOTH entered lineups were untracked
          SaberSim imports swapped in near lock — neither appears in the
          archived lineups.md. They bypassed the thesis requirement, red team,
          and portfolio audit, and were chalkier than the winning band (21.3%
          and 21.4% avg own with 1 and 4 sub-10% plays, vs winners' 15.4-16.0%
          and ~5). Meanwhile the tracked-but-abandoned Lineup 2 held the
          winning skeleton (PHI-5 + Luzardo + Detmers; 6 of 10 players shared
          with the $4K winner). The cost of bypassing the loop is no longer
          hypothetical on this sample.
      - date: "2026-06-12"
        slate: "rules/mlb_classic/history/2026-06-12__mlb-classic-6-11-26"
        evidence: >
          Third confirmation, this time the positive case: for the first time
          in three slates BOTH entered lineups existed in lineups.md pre-lock
          (L1 app-built; L2 chat-built at the user's direction and logged with
          thesis + audit addendum before lock). The loop could see and grade
          everything it was asked to grade, and the fully-audited L1 delivered
          the ledger's best percentile (top 4.4%). Mechanism confirmed from
          both directions now: bypassing the loop produced chalkier-than-band
          entries twice; honoring it produced an in-band entry once.
    contradictions: []
    codified_in: "framework.md — Lineup discipline, HARD RULE (user-approved 2026-06-12)"
    retired_reason: null

  # --- Born from 2026-06-11 post-autopsy (slate: MLB Classic 6.10.26) ---

  - id: mlb-classic-2026-06-11-se-chalk-pitcher-own-condensation
    born: "2026-06-11"
    origin: "rules/mlb_classic/history/2026-06-11__mlb-classic-6-10-26"
    statement: >
      In small-field SE MLB Classic, ownership on the consensus chalk pitcher
      condenses far ABOVE vendor projection: on 6/10 Reid Detmers projected
      38.0% and closed at 68.7% (the slate's worst ownership miss, +30.8; SIN's
      overall own MAE was just 3.28, so this is concentrated at the chalk P1,
      not a calibration problem). Mechanism: a small SE field converges on the
      consensus arm because pitcher is the slate's highest-variance single
      decision and casual SE fields don't diversify it. Leverage math on any
      P1 fade must assume condensation — a "38% fade" can really be a ~69%
      fade (more leveraged AND more binary than projected). Check the prior
      worst_own_miss rows in vendor_calibration.jsonl before sizing a pitcher
      strike.
    status: validated
    confirmations:
      - date: "2026-06-12"
        slate: "rules/mlb_classic/history/2026-06-12__mlb-classic-6-11-26"
        evidence: >
          Mechanism confirmed on the very next slate: Christian Scott
          projected 43.9% and closed at 56.0-62.7% across the two SE
          contests — the consensus P1 condensed again (Detmers 38.0->68.7 on
          6/10). The build USED the lesson pre-lock: Scott was kept rather
          than faded explicitly because "fading him is a 60-70%-actual fade,"
          and the pivot was taken in his own bats instead — the in-band L1
          that kept him finished top 4.4%. Refinement worth tracking:
          condensation concentrated ONLY on the consensus #1 — the cheap #2
          chalk arm (Phillips 21.9% proj) actually closed LOWER (14.6-17.6%).
          SE fields converge on one arm, not on the chalk class.
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mlb-classic-2026-06-11-weather-proof-dome-stack-pivot
    born: "2026-06-11"
    origin: "rules/mlb_classic/history/2026-06-11__mlb-classic-6-10-26"
    statement: >
      When rain risk concentrates field ownership on outdoor offenses, the
      underowned dome/roof stack is the structural pivot of choice. Mechanism:
      weather uncertainty suppresses nothing in the dome while the
      rain-exposed chalk cluster splits its equity across PPD/shortened-game
      risk; the dome stack gets the slate's only guaranteed 9 innings at a
      leverage price. On 6/10 the PHI dome 5-stack (vs TOR; Harper 8.5-9.7%
      own, ~27% combined) appeared in 65-75% of top-20 lineups and won BOTH SE
      contests, while the 77-92%-owned TEX/MIL/ATH outdoor cluster produced
      none of the slate-defining plays. The built Lineup 2 called this
      pre-lock ("underowned Phillies dome offense"), so the mechanism is
      observed at birth — needs confirmation on future weather slates.
    status: hypothesis
    # 2026-06-12 note (no evidence change): correctly judged NOT APPLICABLE
    # on 6/11 — the mechanism's precondition (field ownership concentrated on
    # a rain-exposed offense) was absent; the #1 cluster was CHC at sunny
    # Coors. Pre-flight rejection with the mechanism named, as intended.
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mlb-classic-2026-06-11-late-build-bailout
    born: "2026-06-11"
    origin: "rules/mlb_classic/history/2026-06-11__mlb-classic-6-10-26"
    statement: >
      Process lesson: a lineup build that lands <30 minutes before lock
      collapses trust at exactly the moment nothing can be re-checked. On
      6/10 the build arrived 18:49 ET vs a 19:07 lock after a long spinner;
      with no time for the red team or even a read-through, the audited
      portfolio felt unsafe and was swapped for untracked SaberSim chalk —
      which was worse than the abandoned build (L2 held the winning
      skeleton). Mechanism: the portfolio's trust comes from its audit trail
      (thesis, pre-flight, red team), and that trail needs clock time to
      exist. How to apply: start Analyze -> Build >= 60-90 minutes before
      lock so the red team fits; if a build lands late anyway, the DEFAULT is
      to enter the audited portfolio as-is — swapping to lineups that
      bypassed every check is the higher-variance act, not the safer one.
    status: hypothesis
    # 2026-06-12 note (no status change): on 6/11 the build landed ~35 min
    # pre-lock (12:35/12:40 vs 13:10) — tight again, and the red team was
    # skipped for time — but the trust collapse did NOT recur: the user
    # entered the tracked lineups with no swap. Adherence to the prescribed
    # default, not a mechanism event; logged in the process scorecard.
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  # --- Born from 2026-06-12 post-autopsy (slate: MLB Classic 6.11.26) ---

  - id: mlb-classic-2026-06-12-sin-projection-pool-omissions
    born: "2026-06-12"
    origin: "rules/mlb_classic/history/2026-06-12__mlb-classic-6-11-26"
    statement: >
      The SIN projections CSV can omit priced, playable players entirely —
      on 6/11 Cole Carrigg ($2,500, Stone-ranked at 10.6% own) was missing
      from the 99-player file, so the auto-snapshot and leverage table were
      structurally blind to him; he scored 17.0 at 3.0-4.5% actual own, made
      the $5K Chin Music WINNER, and appeared in 30-40% of top-20 lineups.
      Mechanism: the snapshot can only rank players in the pool; an omitted
      cheap stud is invisible leverage. Cross-check the Stone's value/cheap
      rankings against the projection pool pre-lock and flag any priced
      player the CSV lacks. Caught pre-lock on 6/11 (the analysis noted the
      omission via the Stone), so observed at birth — needs confirmation.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mlb-classic-2026-06-12-five-man-primary-conditional-on-blowup
    born: "2026-06-12"
    origin: "rules/mlb_classic/history/2026-06-12__mlb-classic-6-11-26"
    statement: >
      5-man-primary dominance is conditional on an offense actually going
      off; it is not a structural law. On 6/11 the consensus run environment
      (CHC at Coors, 6.05 implied) delivered only moderately (best Cubs
      17-20 pts, spread across bats) and the winning shapes diversified:
      the $5K Chin Music winner was 3-2-1-1-1 and the $5K Base Hit winner
      4-3-1, with 5-man primaries in well under half of top-20 lineups
      (8-9 of 20) vs 11-14 of 20 on the two prior slates. Mechanism: a
      5-stack multiplies a blowup; when no team blows up, it multiplies
      mediocrity and the extra roster spots beat the extra correlation.
      Stacking remains the core lever (every winner carried a 3+ stack) —
      this is about the 5-man PREMIUM, not stacking itself.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null
