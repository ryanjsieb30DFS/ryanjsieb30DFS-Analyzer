  - id: mlb-classic-2026-06-13-chalk-ace-smash-compresses-pitcher-leverage
    born: "2026-06-13"
    origin: "rules/mlb_classic/history/2026-06-13__mlb-classic-6-12-26"
    statement: >
      When the consensus chalk ace both condenses AND smashes, the pitcher slot
      stops being a differentiator and winning shifts to wide bat-spread. On
      6/12 Misiorowski closed 53-56% owned and went off for 58.65 — so the
      majority of contenders held him, and separation could only come from the
      bats. The winning shapes diversified accordingly: the rank-1 lineup in
      BOTH contests was a fully-spread 1-1-1-1-1-1-1-1 no-stack at 9.2% own, and
      the larger-field top-20 averaged 7.6 sub-10 plays. The mandatory
      Anchor-Equivalence "alternative anchor" lineup (L2, Joe Ryan) structurally
      could NOT hold the smash and finished mid-pack. Mechanism: when everyone
      owns the same ace, the pitcher edge is competed away and EV migrates to
      who paired the best cheap, low-owned bats around him — favoring more sub-10
      bat-spread than the codified pivot-budget band prescribes. How to apply:
      on a slate with a single dominant, condensing chalk ace, lean the bat side
      MORE contrarian/spread (not less); and recognize that satisfying
      Anchor-Equivalence with an alternative arm carries real cost when the
      condensation lesson predicts the chalk ace will smash — treat that
      alternative-anchor lineup as a deliberate hedge against the ace busting,
      not a free requirement. Mechanism-based, born this slate; interacts with
      mlb-classic-2026-06-10-pivot-budget-small-field-se (density watch note) —
      needs confirmation.
    status: validated
    confirmations:
      - date: "2026-06-13"
        slate: "rules/mlb_classic/history/2026-06-13__mlb-classic-6-13-26"
        evidence: >
          CONDITIONAL confirmed by the contrast case — the pitcher-slot
          compression scales WITH condensation magnitude. On 6/12 Misiorowski
          condensed hard (53-56%) AND smashed, and the pitcher slot fully
          stopped differentiating (winners went extreme bat-spread, 7.6 sub-10).
          This slate Yamamoto smashed (34.15) but condensed only MILDLY (37-43%,
          not a majority), so the slot stayed live — and winners diverged on
          pitcher exactly as the milder compression predicts: only ~5 of the
          Rally Cap top-10 held Yamamoto, the rest used Soroka (ranks 2/4/7) or
          a low-owned NYM Manaea (19.1 pts, slate-defining, 35-45% of top-20) or
          deGrom. Bat-spread was correspondingly milder than 6/12 (top-20 ran
          5.3-5.7 sub-10 here vs 7.6), and 5-man primaries reappeared among
          winners (5-2-1/5-1-1-1/5-3). Net: the mechanism is real and
          monotonic in condensation magnitude — heavy condensation kills
          pitcher leverage and forces bat-spread; mild condensation leaves the
          slot live and a low-owned pivot arm (Manaea) becomes the edge.
          Second observing slate (origin 6/12 + this); promoted to validated.
          Practical upgrade: gate "lean the bats MORE spread" on the ace
          actually condensing hard, not merely on it being chalk.
    contradictions: []
