  # --- Born from 2026-06-14 post-autopsy (slate: MLB Classic 6.13.26) ---

  - id: mlb-classic-2026-06-13-independent-se-no-cross-decouple
    born: "2026-06-13"
    origin: "rules/mlb_classic/history/2026-06-13__mlb-classic-6-13-26"
    statement: >
      Two single entries in SEPARATE SE contests do not share a prize pool, so
      "decouple the portfolio / non-competing lineups" discipline — which exists
      to hedge multiple entries inside ONE field — does not transfer across
      contests. Each independent SE entry should be the highest-EV build for its
      OWN field size and payout curve (ceiling for top-heavy, floor+ceiling for
      flat), even when that means both entries express the same top edge. On
      6/13 the red team issued a portfolio FIX to decouple L1 off the shared
      LAD-5 + Yamamoto core; the FIX was taken and L1 was rebuilt to BAL-5/CIN-3
      (LAD-0) for the top-heavy Rally Cap while L2 kept LAD-5/ARI-2 for the
      flatter Chin Music. The decouple drove the Rally entry entirely off LAD —
      the analysis's #1 edge AND the home of the slate-defining play (Max Muncy
      $4,500, 39 pts, 9% own, in 65-70% of top-20 winners and the rank-1 lineups
      in BOTH contests). L1 landed on the two games (Camden + GABP) that died and
      finished 43.4%; the LAD-holding L2 finished 15.4% (the portfolio's better
      entry). Mechanism: differentiating two entries from EACH OTHER buys nothing
      when they cash from independent pools — the differentiation that pays is
      per-contest (which the high-ceiling-to-top-heavy split already delivered),
      and that is fully compatible with both entries holding the slate's best
      game. How to apply: when entries are in separate contests, do NOT decouple
      them off your highest-conviction game to make them "different"; let each be
      the best build for its field, and keep your #1 edge in both if conviction
      warrants. SCOPE BOUNDARY, not a contradiction, of
      mlb-classic-2026-06-01-distinct-thesis-per-lineup (which governs
      multi-entry WITHIN one field). GPP guard: one slate, and the off-LAD
      ceiling build was the contest-correct shape for a top-heavy field — the
      LOSS is not the evidence; the independent-payout STRUCTURE is. Needs
      confirmation.
    status: hypothesis
    confirmations: []
    contradictions: []
    codified_in: null
    retired_reason: null

  - id: mlb-classic-2026-06-13-condensation-magnitude-vs-tier-isolation
    born: "2026-06-13"
    origin: "rules/mlb_classic/history/2026-06-13__mlb-classic-6-13-26"
    statement: >
      The SE chalk-pitcher condensation MAGNITUDE scales with how ISOLATED the
      consensus #1 arm is, and is not the flat +30 the codified lesson applies.
      The three +30 events (Detmers 38->69, Scott 44->56-63, Misiorowski 25->55)
      were each a lone consensus #1 with clear daylight to the next arm. On 6/13
      Yamamoto was the projected-own #1 (35.3%) but sat in a tight premium tier
      — deGrom 25.5%, Skubal 27.8%, both within ~10% — and condensed only +2 to
      +8 (37.41% / 43.27%). Mechanism: a fragmented top tier gives the casual SE
      field several defensible "best arms," so convergence splits across them
      instead of piling onto one; an isolated #1 has no such outlet and absorbs
      the full pile. How to apply: when sizing a pitcher fade, scale the assumed
      condensation to tier isolation — a #1 standing alone is a near-+30 (and a
      brutal fade), but a #1 inside a 3-arm cluster condenses far less (Yamamoto
      was a real 37-43% fade, not the "55-60% binary" the flat +30 implied).
      Refines the MAGNITUDE of mlb-classic-2026-06-11-se-chalk-pitcher-own-condensation
      (whose up-DIRECTION is now 4-for-4) without contradicting it. Born this
      slate, needs confirmation.
    status: hypothesis
