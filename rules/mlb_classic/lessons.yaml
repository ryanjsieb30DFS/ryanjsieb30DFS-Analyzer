  - id: mlb-classic-2026-06-13-condensation-target-projected-leader
    born: "2026-06-13"
    origin: "rules/mlb_classic/history/2026-06-13__mlb-classic-6-12-26"
    statement: >
      SE chalk-pitcher condensation lands on the PROJECTED-OWNERSHIP #1 arm,
      NOT on the cheapest/most "affordable" viable chalk arm. Refines (and
      corrects a corollary used against) se-chalk-pitcher-own-condensation. On
      6/12 the build hypothesized condensation would concentrate on Yesavage
      ($8.5K, the affordable arm) because he fits next to chalk bats, and built
      L2 to fade him; instead it concentrated on Misiorowski ($12K, projected #1
      at 25.2 vs Yesavage 23.6), who closed 53-56% — the same pattern as the two
      prior condensation events (Detmers and Scott were each the projected #1,
      regardless of price). Mechanism: a casual SE field converges on the single
      arm the projections crown as best, not on the one that optimizes salary;
      price is not the convergence driver, consensus rank is. How to apply: when
      sizing a pitcher fade, identify the condensation target as the
      projected-own #1 and assume IT closes far above projection; do not assume
      condensation transfers to a cheaper arm. The red team flagged this exact
      pattern pre-lock and was right — mechanism-based, born this slate, needs
      confirmation.
    status: codified
    confirmations: []
    contradictions: []
    codified_in: >
      framework.md — Construction (user-approved 2026-06-13): folded into
