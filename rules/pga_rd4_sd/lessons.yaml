  - id: pga-rd4-sd-2026-06-19-contention-extends-past-54hole-leaders
    born: "2026-06-19"   # RBC Canadian Open R4 SD
    origin: "autopsies.md — PGA RD4 SD RBC Canada 2026 (the -9/3-back chasers, faded as 'not T-10 starters', were the slate-definers)"
    statement: >
      On RD4 SD, final-round contention extends well past the 54-hole leaders, and a
      hard position gate that fades golfers 2-4 shots back ('not a T-10 starter') is a
      ceiling leak — those chasers carry full ceiling, are usually lower-owned than the
      leaders, and are exactly who wins when Sunday scoring reopens. Distinguish three
      buckets, do NOT collapse the back two into one: (1) leaders/T-10 = chalk;
      (2) IN-CONTENTION chasers 2-4 back (here -9, 3 back) = full ceiling, the real
      leverage tier; (3) WAY-BACK darts (>6-7 back / over par) = can't post the needed
      round on a tough course, the only bucket the position gate should actually
      exclude. The 'birdie hedge = way-back sub-5% lottery tickets' construction is its
      own leak: hedge the reopened-scoring world with bucket-2 chasers, not bucket-3
      darts; reserve true way-back darts for confirmed -19/-20 birdie-fests only.
    status: hypothesis
    confirmations:
      - date: "2026-06-19"
        slate: "PGA RD4 SD RBC Canada 2026 (rules/pga_rd4_sd/history/2026-06-19__pga-rd4-sd-rbc-canada-2026)"
        note: >
          BORN here. Winning lineup = Fitzpatrick (-9 T12, scored 65.4) + Hovland (-9 T12) + Cauley +
          Fox + Taylor Moore + Keita Nakajima; Fitzpatrick was THE slate-definer (67.4% of top
          lineups, 15.55% own). The analysis rated Fitzpatrick MIX-down and PASSED Hovland explicitly
